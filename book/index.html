<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Η/Μ κύμα · βιβλίο σελίδων</title>
<style>
:root{
  --bg:#ece6d9;
  --paper:#fffdf9;
  --ink:#1d2730;
  --muted:#5e6d79;
  --line:#ddd3c3;
  --accent:#1f5f8b;
  --accent-soft:#e7f0f6;
  --note:#f6efdc;
  --figure:#f6f8fa;
  --sheet-width:794px;
  --sheet-height:1123px;
  --sheet-pad-x:48px;
  --sheet-pad-y:46px;
  --screen-scale:1;
  --shadow:0 18px 36px rgba(0,0,0,.10);
  --shape-width:340px;
  --body-leading:1.34;
  --para-gap:7px;
  --section-gap:16px;
  --note-gap:10px;
  --callout-gap:8px;
  --header-h:28px;
  --footer-h:22px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:linear-gradient(180deg,#efe9dc 0,#ece6d9 120px);
  color:var(--ink);
  font:15px/var(--body-leading) Georgia,"Noto Serif",serif;
}
.topbar{
  position:sticky; top:0; z-index:30;
  backdrop-filter:blur(10px);
  background:rgba(236,230,217,.88);
  border-bottom:1px solid rgba(0,0,0,.08);
}
.topbar-inner{
  max-width:1200px; margin:0 auto; padding:10px 18px;
}
.mega-nav{
  display:grid;
  grid-template-columns:repeat(5,minmax(120px,1fr));
  gap:10px;
  align-items:stretch;
  justify-content:center;
  width:100%;
  max-width:var(--sheet-width);
  margin:0 auto;
}
.menu-item{min-width:0}
.menu-trigger,.menu-btn{
  display:flex; width:100%; min-width:0; align-items:center; justify-content:center;
  border:1px solid rgba(0,0,0,.12); background:#fff; color:var(--ink);
  padding:10px 12px; border-radius:18px; font:700 13px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;
  text-decoration:none; white-space:nowrap; text-align:center; box-shadow:0 6px 18px rgba(0,0,0,.04); cursor:pointer;
}
.menu-item.active .menu-trigger,.menu-btn:hover{background:#f7fafc;border-color:#cfd8e0;color:#173f5b}
.viewport{max-width:1200px; margin:0 auto; padding:24px 18px 60px}
.page-stack{display:flex; flex-direction:column; align-items:center; gap:26px}
.sheet-wrap{
  width:calc(var(--sheet-width) * var(--screen-scale));
  min-height:calc(var(--sheet-height) * var(--screen-scale));
  position:relative;
}
.sheet{
  width:var(--sheet-width);
  min-height:var(--sheet-height);
  transform:scale(var(--screen-scale));
  transform-origin:top left;
  background:var(--paper);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  position:absolute; left:0; top:0;
}
.sheet-inner{
  position:relative;
  min-height:100%;
  padding:var(--sheet-pad-y) var(--sheet-pad-x);
}
.sheet-header{
  height:var(--header-h);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:start;
  border-bottom:1px solid rgba(0,0,0,.08);
  padding-bottom:6px;
  margin-bottom:18px;
  font:800 10px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;
  letter-spacing:.11em;
  text-transform:uppercase;
  color:#7f8890;
}
.sheet-header .c{text-align:center}
.sheet-header .r{text-align:right}
.sheet-body{
  display:flow-root;
  min-height:calc(var(--sheet-height) - (var(--sheet-pad-y) * 2) - var(--header-h) - var(--footer-h) - 22px);
}
.sheet-footer{
  position:absolute;
  left:var(--sheet-pad-x);
  right:var(--sheet-pad-x);
  bottom:20px;
  height:var(--footer-h);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:end;
  font:600 12px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;
  color:#7b8791;
}
.sheet-footer .c{text-align:center}
.sheet-footer .r{text-align:right}

.hero{margin:0 0 var(--section-gap)}
.eyebrow{margin:0 0 10px;font:800 13px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)}
h1{margin:0 0 8px;font-family:Georgia,"Times New Roman",serif;font-size:31px;line-height:1.06;letter-spacing:-.016em;font-weight:760;color:#1b506f}
.subtitle{margin:0;color:var(--muted);font-size:15px;line-height:1.42;max-width:56ch}

.part-head{margin:0 0 var(--section-gap);padding:0 0 8px;border-bottom:1px solid rgba(0,0,0,.08)}
.part-kicker{margin:0 0 6px;font:800 10px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-transform:uppercase;letter-spacing:.11em;color:#8a6a32}
.part-title-main{margin:0;font:780 24px/1.08 "Avenir Next","Segoe UI",system-ui,-apple-system,Arial,sans-serif;letter-spacing:-.022em;color:#2f627f}

.section-heading{margin:0 0 8px;font:690 18px/1.18 Georgia,"Noto Serif",serif;letter-spacing:-.008em;color:#5d7281}
.paragraph{margin:0 0 var(--para-gap); text-align:justify; text-justify:inter-word; hyphens:auto}
.note{
  margin:var(--note-gap) 0; padding:10px 12px; border-radius:14px; background:var(--note); border:1px solid #e4d7ae;
  font:500 13px/1.45 system-ui,-apple-system,Segoe UI,Arial,sans-serif;
}
.note .label{display:block;margin:0 0 5px;font:800 10.5px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#8d6d1c}

figure.media{
  margin:6px 0 16px; background:var(--figure); border:1px solid var(--line); border-radius:18px; overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.04);
}
figure.media.float-right,figure.media.float-left{width:min(var(--figure-width, var(--shape-width)), 42vw);margin-top:4px}
figure.media.float-right{float:right;margin:4px 0 10px 20px}
figure.media.float-left{float:left;margin:4px 20px 10px 0}
figure.media.wide{clear:both;width:100%;max-width:100%;margin:18px 0}
.media-frame{position:relative;width:100%;background:#dde7ee;overflow:hidden;aspect-ratio:16/9}
.media-frame.natural{aspect-ratio:auto;background:#fff;overflow:visible}
.media-frame iframe,.media-frame img,.media-placeholder,.print-scene-snapshot{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
.media-frame img{object-fit:cover}
.media-frame.natural img{position:static;inset:auto;width:100%;height:auto;object-fit:contain;display:block}
.media-placeholder{display:grid;place-items:center;text-align:center;padding:22px;background:linear-gradient(135deg,#f7fbfd,#e1ebf1);color:#465666;font:600 15px/1.5 system-ui,-apple-system,Segoe UI,Arial,sans-serif}
.print-scene-snapshot{display:none;object-fit:contain;background:#fff}
figcaption{padding:12px 14px 14px;font:500 14px/1.55 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--muted);border-top:1px solid rgba(0,0,0,.07)}

.callout{
  margin:var(--callout-gap) 0; padding:8px 10px; border:1px solid #d6e2eb; border-radius:12px; background:#f8fbfd;
  font:500 11.5px/1.36 system-ui,-apple-system,Segoe UI,Arial,sans-serif; color:#29414f;
}
.callout-title{margin:0 0 7px;font:800 10.5px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-transform:uppercase;letter-spacing:.08em;color:#2f698f}
.callout-row{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin:0 0 5px}
.callout-label{font:700 10px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#5a7386;padding:4px 6px;border-radius:999px;background:#eef4f8;border:1px solid #d7e4ec}
.callout-chip{display:inline-flex;align-items:center;justify-content:center;min-height:22px;padding:4px 7px;border-radius:999px;background:#fff;border:1px solid #d6e2eb;font:700 10px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#203848}
.callout-observe{margin-top:4px;padding-top:6px;border-top:1px dashed #cfdbe3}
.callout-observe-title{font:700 10px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#7b5c2a;margin-right:6px}
.callout-observe ul{margin:6px 0 0 18px;padding:0}
.callout-observe li{margin:4px 0;font-style:italic}
.clear{clear:both}
.status{max-width:var(--sheet-width);margin:16px auto 0;color:var(--muted);font:500 14px/1.5 system-ui,-apple-system,Segoe UI,Arial,sans-serif}

.math-inline math{font-size:1em}
@media (max-width:980px){
  .mega-nav{grid-template-columns:repeat(3,minmax(120px,1fr))}
}
@media (max-width:760px){
  .mega-nav{grid-template-columns:repeat(2,minmax(120px,1fr))}
}
@media print{
  @page{size:A4 portrait; margin:0}
  html,body{background:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact}
  body{font:15px/var(--body-leading) Georgia,"Noto Serif",serif !important}
  .topbar,.status{display:none !important}
  .viewport{padding:0 !important; max-width:none !important}
  .page-stack{gap:0 !important}
  .sheet-wrap{
    width:210mm !important;
    min-height:297mm !important;
    page-break-after:always;
    break-after:page;
    overflow:hidden !important;
  }
  .sheet-wrap:last-child{page-break-after:auto;break-after:auto}
  .sheet{
    width:210mm !important;
    min-height:297mm !important;
    transform:none !important;
    position:relative !important;
    left:auto !important;
    top:auto !important;
    border:0 !important;
    box-shadow:none !important;
    overflow:hidden !important;
  }
  .sheet-inner{padding:14mm !important}
  .sheet-header{margin-bottom:14px}
  .sheet-footer{left:14mm !important; right:14mm !important; bottom:10mm !important}
  .sheet-body{min-height:calc(297mm - 28mm - var(--header-h) - var(--footer-h) - 22px) !important}
  figure.media,.note,.callout,.hero,.part-head,.section-heading{break-inside:avoid; page-break-inside:avoid}
  .media-frame iframe{display:none !important}
  .media-frame img{object-fit:contain !important; background:#fff !important}
  .media-frame::after{
    content:"[Η διαδραστική σκηνή εμφανίζεται στην ψηφιακή έκδοση]";
    position:absolute; inset:0; display:grid; place-items:center;
    padding:18px; color:#5e6d79; font:600 13px/1.4 system-ui,-apple-system,Segoe UI,Arial,sans-serif; background:#f4f6f8;
  }
  .media-frame.print-ready{background:#fff !important}
  .media-frame.print-ready::after{content:none !important}
  .print-scene-snapshot{display:block !important; object-fit:contain !important; background:#fff !important}
}
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <nav class="mega-nav" id="megaNav" aria-label="Μενού βιβλίου"></nav>
    </div>
  </div>

  <main class="viewport">
    <div class="page-stack" id="pageStack"></div>
    <div class="status" id="status"></div>
  </main>

<script>
'use strict';
const pageStack=document.getElementById('pageStack');
const megaNav=document.getElementById('megaNav');
const statusEl=document.getElementById('status');
const JSON_CANDIDATES=['chapter_content_pages_v1.json','chapter_content.json'];

function setStatus(msg){ statusEl.textContent = msg || ''; }
function esc(s=''){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function applyScreenScale(){
  const avail=Math.max(320, window.innerWidth - 48);
  const scale=Math.min(1, avail / 794);
  document.documentElement.style.setProperty('--screen-scale', String(scale));
}
window.addEventListener('resize', applyScreenScale, {passive:true});

function replaceTokens(value, ctx){
  return String(value || '')
    .replace(/\{page\}/g, String(ctx.page || ''))
    .replace(/\{pages\}/g, String(ctx.pages || ''));
}
function placementClass(item){
  const p=String(item?.placement || '').toLowerCase();
  if(p==='left') return 'float-left';
  if(p==='right') return 'float-right';
  return 'wide';
}
function withCacheBust(url){
  try{
    const u=new URL(url, window.location.href);
    u.searchParams.set('_cb', String(Date.now()));
    return u.toString();
  }catch(_e){ return url; }
}
function normalizeAppSrc(url=''){
  const raw=String(url || '').trim();
  if(!raw) return raw;
  if(/^https?:\/\//i.test(raw) || raw.startsWith('data:') || raw.startsWith('blob:')) return raw;
  const path=(window.location.pathname || '').replace(/\\/g,'/').toLowerCase();
  const inBook=/\/book(\/|$)/.test(path);
  const appEntry=inBook ? '../index.html' : './index.html';
  return raw
    .replace(/^\.\.\/index_printmatch\.html/i, appEntry)
    .replace(/^\.\.\/index\.html/i, appEntry)
    .replace(/^\.\.\/app\/em_wave_app\.html/i, appEntry)
    .replace(/^\.\//, './')
    .replace(/\.\.\/index_printmatch\.html/g, appEntry)
    .replace(/\.\.\/index\.html/g, appEntry)
    .replace(/\.\.\/app\/em_wave_app\.html/g, appEntry);
}
function imageSrcCandidates(src=''){
  const raw=String(src||'').trim();
  if(!raw) return [];
  if(/^https?:\/\//i.test(raw) || raw.startsWith('data:') || raw.startsWith('blob:')) return [raw];
  const path=(window.location.pathname||'').replace(/\\/g,'/').toLowerCase();
  const inBook=/\/book(\/|$)/.test(path);
  const list=[];
  const push=v=>{ if(v && !list.includes(v)) list.push(v); };
  push(raw);
  if(inBook){
    if(raw.startsWith('images/')) push(`./${raw}`);
    if(raw.startsWith('./images/')) push(raw.slice(2));
    if(raw.startsWith('book/images/')) push(raw.replace(/^book\//,''));
    if(raw.startsWith('../book/images/')) push(raw.replace(/^\.\.\/book\//,''));
  }else{
    if(raw.startsWith('images/')) push(`./book/${raw}`);
    if(raw.startsWith('./images/')) push(`./book/${raw.slice(2)}`);
    if(raw.startsWith('/images/')) push(`./book${raw}`);
    if(raw.startsWith('book/images/')) push(`./${raw}`);
    if(raw.startsWith('../book/images/')) push(raw.replace(/^\.\.\//,'./'));
  }
  return list;
}
function applyImageWithFallback(img, rawSrc=''){
  const candidates=imageSrcCandidates(rawSrc);
  let i=0;
  const tryNext=()=>{
    if(i>=candidates.length){
      img.dispatchEvent(new CustomEvent('imagefallbackfailed'));
      return;
    }
    img.src=candidates[i++];
  };
  img.addEventListener('error', tryNext);
  tryNext();
}
function waitForImage(img){
  return new Promise(resolve=>{
    if(!img || img.complete) return resolve();
    img.addEventListener('load', ()=>resolve(), {once:true});
    img.addEventListener('error', ()=>resolve(), {once:true});
  });
}
async function requestIframePrintSnapshot(iframe){
  if(!iframe) return null;
  try{
    const direct=iframe.contentWindow?.getBookPrintSnapshot || iframe.contentWindow?.EMWaveApp?.getPrintSnapshot;
    if(typeof direct==='function'){
      const r=await Promise.resolve(direct.call(iframe.contentWindow));
      if(r) return r;
    }
  }catch(_e){}
  return await new Promise(resolve=>{
    const requestId=`snap_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    let settled=false;
    const cleanup=()=>{ if(settled) return; settled=true; window.removeEventListener('message', onMessage); clearTimeout(timer); };
    const onMessage=(event)=>{
      if(event.source!==iframe.contentWindow) return;
      const data=event.data;
      if(!data || data.type!=='hm_print_snapshot' || data.requestId!==requestId) return;
      cleanup();
      resolve(data.dataUrl || null);
    };
    const timer=setTimeout(()=>{ cleanup(); resolve(null); }, 4000);
    window.addEventListener('message', onMessage);
    try{ iframe.contentWindow?.postMessage({type:'capturePrintSnapshot', requestId}, '*'); }
    catch(_e){ cleanup(); resolve(null); }
  });
}
let printSnapshotsPrepared = false;
let printFlowRunning = false;

function cleanupPrintSnapshots(){
  document.querySelectorAll('.print-scene-snapshot').forEach(img=>img.remove());
  document.querySelectorAll('.media-frame.print-ready').forEach(el=>el.classList.remove('print-ready'));
  printSnapshotsPrepared = false;
  printFlowRunning = false;
}
async function preparePrintSnapshots(force=false){
  if(printSnapshotsPrepared && !force) return;
  cleanupPrintSnapshots();
  const iframes=Array.from(document.querySelectorAll('.media-frame iframe'));
  await Promise.all(iframes.map(async iframe=>{
    const dataUrl=await requestIframePrintSnapshot(iframe);
    if(!dataUrl) return;
    const holder=iframe.parentElement;
    if(!holder) return;
    const img=document.createElement('img');
    img.className='print-scene-snapshot';
    img.alt='Στιγμιότυπο σκηνής';
    img.src=dataUrl;
    holder.appendChild(img);
    await waitForImage(img);
    holder.classList.add('print-ready');
  }));
  printSnapshotsPrepared = true;
}
async function beginPrintFlow(){
  if(printFlowRunning) return;
  printFlowRunning = true;
  setStatus('Ετοιμάζονται στατικά στιγμιότυπα για την εκτύπωση…');
  try{
    await preparePrintSnapshots(true);
  }catch(err){
    console.warn(err);
  }
  setStatus('');
  window.print();
}
window.addEventListener('beforeprint', ()=>{
  if(!printSnapshotsPrepared){
    try{ preparePrintSnapshots(false); }catch(_e){}
  }
});
window.addEventListener('afterprint', ()=>{
  cleanupPrintSnapshots();
  setStatus('');
});

function sceneAspect(item){
  const src=String(item.singleSrc||'');
  let layout='';
  try{
    const u=new URL(normalizeAppSrc(src), window.location.href);
    layout=(u.searchParams.get('layout')||'').toLowerCase();
  }catch(_e){}
  const g=146.2, r=219.3, c=34;
  if(layout==='rod_only') return 340/(r+c);
  if(layout==='rod_1graph') return 340/(r+g+c);
  if(layout==='rod_2graphs') return 340/(r+g*2+c);
  if(layout==='rod_3graphs') return 340/(r+g*3+c);
  return 16/9;
}

function renderHero(item){
  const wrap=document.createElement('section');
  wrap.className='hero';
  wrap.innerHTML=`${item.eyebrow?`<p class="eyebrow">${item.eyebrow}</p>`:''}${item.title?`<h1>${item.title}</h1>`:''}${item.subtitle?`<p class="subtitle">${item.subtitle}</p>`:''}`;
  return wrap;
}
function renderPartTitle(item){
  const d=document.createElement('section');
  d.className='part-head';
  d.innerHTML=`${item.label?`<p class="part-kicker">${item.label}</p>`:''}${item.title?`<h2 class="part-title-main">${item.title}</h2>`:''}`;
  return d;
}
function renderSectionHeading(item){
  const h=document.createElement('h2');
  h.className='section-heading';
  h.textContent=item.title || '';
  return h;
}
function renderParagraph(item){
  const p=document.createElement('p');
  p.className='paragraph';
  p.innerHTML=item.html || '';
  return p;
}
function renderNote(item){
  const d=document.createElement('div');
  d.className='note';
  d.innerHTML=`${item.label?`<span class="label">${item.label}</span>`:''}${item.html||''}`;
  return d;
}
function renderFigure(item){
  const fig=document.createElement('figure');
  fig.className=`media ${placementClass(item)}`;
  if(item.frameWidth) fig.style.setProperty('--figure-width', `${item.frameWidth}px`);
  const frame=document.createElement('div');
  frame.className=`media-frame ${item.aspect==='natural'?'natural':''}`.trim();
  const img=document.createElement('img');
  img.alt=item.alt || item.title || 'Εικόνα';
  img.addEventListener('imagefallbackfailed', ()=>{
    img.remove();
    const ph=document.createElement('div');
    ph.className='media-placeholder';
    ph.innerHTML=`<div><strong>${esc(item.title || 'Εικόνα')}</strong><br>Το αρχείο εικόνας δεν βρέθηκε.</div>`;
    frame.appendChild(ph);
  }, {once:true});
  applyImageWithFallback(img, item.src || '');
  frame.appendChild(img);
  fig.appendChild(frame);
  if(!item.hideCaption){
    const cap=document.createElement('figcaption');
    cap.textContent=item.caption || item.title || 'Εικόνα';
    fig.appendChild(cap);
  }
  return fig;
}
function renderScene(item){
  const fig=document.createElement('figure');
  fig.className=`media ${placementClass(item)}`;
  if(item.frameWidth) fig.style.setProperty('--figure-width', `${item.frameWidth}px`);
  const frame=document.createElement('div');
  frame.className='media-frame';
  frame.style.aspectRatio=String(sceneAspect(item));
  const iframe=document.createElement('iframe');
  iframe.loading='lazy';
  iframe.referrerPolicy='no-referrer';
  iframe.allow='fullscreen';
  iframe.src=withCacheBust(normalizeAppSrc(item.singleSrc || ''));
  frame.appendChild(iframe);
  fig.appendChild(frame);
  if(!item.hideCaption){
    const cap=document.createElement('figcaption');
    cap.textContent=item.caption || item.title || 'Σκηνή';
    fig.appendChild(cap);
  }
  return fig;
}
function renderCallout(item){
  const d=document.createElement('div');
  d.className='callout';
  const setup=(item.setupChips||[]).length ? `<div class="callout-row"><span class="callout-label">${item.setupLabel || 'Ρύθμισε'}</span>${(item.setupChips||[]).map(t=>`<span class="callout-chip">${t}</span>`).join('')}</div>` : '';
  const press=(item.pressChips||[]).length ? `<div class="callout-row"><span class="callout-label">${item.pressLabel || 'Πίεσε'}</span>${(item.pressChips||[]).map(t=>`<span class="callout-chip">${t}</span>`).join('')}</div>` : '';
  const observe=(item.observeItems||[]).length ? `<div class="callout-observe"><span class="callout-observe-title">${item.observeTitle || 'Παρατήρησε'}</span><ul>${(item.observeItems||[]).map(t=>`<li>${t}</li>`).join('')}</ul></div>` : '';
  d.innerHTML=`<div class="callout-title">${item.title || 'Δοκίμασε'}</div>${setup}${press}${observe}`;
  return d;
}
function renderItem(item){
  if(!item || typeof item!=='object'){
    const d=document.createElement('div');
    d.textContent='Άκυρο item';
    return d;
  }
  switch(item.type){
    case 'hero': return renderHero(item);
    case 'part_title': return renderPartTitle(item);
    case 'section_heading': return renderSectionHeading(item);
    case 'paragraph': return renderParagraph(item);
    case 'note': return renderNote(item);
    case 'figure': return renderFigure(item);
    case 'scene': return renderScene(item);
    case 'interactive_callout': return renderCallout(item);
    case 'clear': { const d=document.createElement('div'); d.className='clear'; return d; }
    default: {
      const d=document.createElement('div');
      d.textContent=`Άγνωστο block: ${item.type}`;
      return d;
    }
  }
}
function buildHeader(page, pageNo, total){
  const h=document.createElement('div');
  h.className='sheet-header';
  h.innerHTML=`<div class="l">${replaceTokens(page.header?.left, {page:pageNo,pages:total})}</div><div class="c">${replaceTokens(page.header?.center, {page:pageNo,pages:total})}</div><div class="r">${replaceTokens(page.header?.right, {page:pageNo,pages:total})}</div>`;
  return h;
}
function buildFooter(page, pageNo, total, showNumbers=true){
  const f=document.createElement('div');
  f.className='sheet-footer';
  const rightDefault=showNumbers ? '{page}' : '';
  f.innerHTML=`<div class="l">${replaceTokens(page.footer?.left, {page:pageNo,pages:total})}</div><div class="c">${replaceTokens(page.footer?.center, {page:pageNo,pages:total})}</div><div class="r">${replaceTokens(page.footer?.right ?? rightDefault, {page:pageNo,pages:total})}</div>`;
  return f;
}
function renderPages(data){
  const pages=Array.isArray(data.pages) ? data.pages : [];
  const total=pages.length;
  pageStack.innerHTML='';
  pages.forEach((page, idx)=>{
    const wrap=document.createElement('div');
    wrap.className='sheet-wrap';
    wrap.id=page.id || `page-${idx+1}`;
    const sheet=document.createElement('section');
    sheet.className='sheet';
    const inner=document.createElement('div');
    inner.className='sheet-inner';
    inner.appendChild(buildHeader(page, idx+1, total));
    const body=document.createElement('div');
    body.className='sheet-body';
    (page.items || []).forEach(item => body.appendChild(renderItem(item)));
    inner.appendChild(body);
    inner.appendChild(buildFooter(page, idx+1, total, data.layoutDefaults?.showPageNumbers !== false));
    sheet.appendChild(inner);
    wrap.appendChild(sheet);
    pageStack.appendChild(wrap);
  });
}
function deriveNav(data){
  const partFirstPages=new Map();
  (data.pages || []).forEach((page, idx)=>{
    const item=(page.items||[]).find(it => it.type==='part_title');
    if(item){
      const key=(item.label||'') + '|' + (item.title||'');
      if(!partFirstPages.has(key)){
        partFirstPages.set(key, {
          id: page.id || `page-${idx+1}`,
          text: item.title || item.label || `Σελίδα ${idx+1}`
        });
      }
    }
  });
  const items=[...partFirstPages.values()];
  megaNav.innerHTML='';
  items.forEach(entry=>{
    const node=document.createElement('div');
    node.className='menu-item';
    node.innerHTML=`<a class="menu-trigger" href="#${entry.id}">${esc(entry.text)}</a>`;
    megaNav.appendChild(node);
  });
  const printNode=document.createElement('div');
  printNode.className='menu-item';
  const btn=document.createElement('button');
  btn.type='button';
  btn.className='menu-btn';
  btn.id='printBtn';
  btn.textContent='Εκτύπωση';
  btn.addEventListener('click', async ()=>{ await beginPrintFlow(); });
  printNode.appendChild(btn);
  megaNav.appendChild(printNode);
}
function updateActiveNav(){
  const pageEls=Array.from(document.querySelectorAll('.sheet-wrap[id]'));
  const y=window.scrollY + 140;
  let activeId='';
  for(const el of pageEls){
    if(el.getBoundingClientRect().top + window.scrollY <= y) activeId=el.id;
  }
  megaNav.querySelectorAll('.menu-item').forEach(node=>{
    const a=node.querySelector('a.menu-trigger');
    node.classList.toggle('active', !!(a && a.getAttribute('href') === `#${activeId}`));
  });
}
window.addEventListener('scroll', updateActiveNav, {passive:true});

async function loadData(){
  let lastErr=null;
  for(const name of JSON_CANDIDATES){
    try{
      const res=await fetch(name, {cache:'no-store'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }catch(err){
      lastErr=err;
    }
  }
  throw lastErr || new Error('Δεν βρέθηκε JSON');
}
async function boot(){
  applyScreenScale();
  const data=await loadData();
  if(data?.schemaVersion !== 'pages-v1' && !Array.isArray(data?.pages)){
    throw new Error('Το βιβλίο περιμένει page-first JSON (pages-v1).');
  }
  const defs=data.layoutDefaults || {};
  if(defs.lineHeight) document.documentElement.style.setProperty('--body-leading', String(defs.lineHeight));
  if(typeof defs.paragraphGap === 'number') document.documentElement.style.setProperty('--para-gap', `${defs.paragraphGap}px`);
  if(typeof defs.sectionGap === 'number') document.documentElement.style.setProperty('--section-gap', `${defs.sectionGap}px`);
  if(typeof defs.noteGap === 'number') document.documentElement.style.setProperty('--note-gap', `${defs.noteGap}px`);
  if(typeof defs.calloutGap === 'number') document.documentElement.style.setProperty('--callout-gap', `${defs.calloutGap}px`);
  const padMm = Number(defs.pageInnerPaddingMm);
  if(Number.isFinite(padMm) && padMm > 0){
    const px = Math.round(padMm * 3.7795);
    document.documentElement.style.setProperty('--sheet-pad-x', `${px}px`);
    document.documentElement.style.setProperty('--sheet-pad-y', `${px}px`);
  }
  renderPages(data);
  deriveNav(data);
  updateActiveNav();
  setStatus(`Σελίδες: ${(data.pages||[]).length}`);
}
boot().catch(err=>{
  console.error(err);
  setStatus(`Σφάλμα φόρτωσης: ${err.message}`);
});
</script>
