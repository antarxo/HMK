<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Η/Μ κύμα · ηλεκτρονικό βιβλίο</title>
<style>
:root{--bg:#f3efe6;--paper:#fffdf9;--ink:#1d2730;--muted:#5e6d79;--line:#ddd3c3;--accent:#1f5f8b;--accent-soft:#e7f0f6;--note:#f6efdc;--figure:#f6f8fa;--max-page:1180px;--paper-width:980px;--article-width:860px;--shape-width:340px;--shadow:0 12px 32px rgba(0,0,0,.08);--print-freeze-width:980px;--print-freeze-scale:1}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;background:linear-gradient(180deg,#efe9dc 0,#f3efe6 120px);color:var(--ink);font:18px/1.72 Georgia,"Noto Serif",serif}
.topbar{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);background:rgba(243,239,230,.88);border-bottom:1px solid rgba(0,0,0,.08)}
.topbar-inner{max-width:var(--paper-width);margin:0 auto;padding:10px 18px 12px}.topbar-main{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
button,a.action{appearance:none;border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--ink);padding:10px 14px;border-radius:999px;font:600 14px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-decoration:none;cursor:pointer}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.toolbar label{font:600 13px/1.2 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--muted);display:flex;align-items:center;gap:8px}.toolbar select{appearance:none;border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--ink);padding:10px 12px;border-radius:12px;font:600 13px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif}
.mega-nav{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;align-items:stretch;justify-content:center;width:100%;max-width:var(--paper-width);margin:0 auto}.menu-item{min-width:0}.menu-trigger{display:flex;width:100%;min-width:0;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--ink);padding:10px 12px;border-radius:18px;font:700 13px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-decoration:none;white-space:nowrap;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.04)}.menu-item.active .menu-trigger{background:#f7fafc;border-color:#cfd8e0;color:#173f5b}
.page{max-width:var(--max-page);margin:0 auto;padding:22px 18px 80px}.hero,.chapter{max-width:var(--paper-width);margin:0 auto;background:var(--paper);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.hero{margin-bottom:20px;padding:30px 28px 24px}.chapter{padding:34px 28px 38px;overflow:hidden}
.eyebrow{margin:0 0 10px;font:800 13px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)} h1{margin:0 0 10px;font-family:Georgia,"Times New Roman",serif;font-size:clamp(30px,3.25vw,42px);line-height:1.08;letter-spacing:-.016em;font-weight:760;color:#1b506f} .subtitle{margin:0;color:var(--muted);font-size:18px;line-height:1.5;max-width:56ch}.intro-note{margin-top:18px;padding:14px 16px;border-radius:16px;background:var(--accent-soft);border:1px solid #cddfea;font:500 16px/1.55 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#28485f}
.part-shell{margin:0 0 42px;padding:0 0 8px;border-bottom:1px solid rgba(0,0,0,.08)} .part-shell:last-child{border-bottom:0;margin-bottom:0}.part-kicker{margin:0 0 8px;font:800 11px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-transform:uppercase;letter-spacing:.11em;color:#8a6a32}.part-title-main{margin:0 0 16px;font:780 clamp(24px,2.4vw,31px)/1.09 "Avenir Next","Segoe UI",system-ui,-apple-system,Arial,sans-serif;letter-spacing:-.022em;color:#2f627f}
.section{scroll-margin-top:82px;margin:0 0 36px;padding-bottom:20px;border-bottom:1px solid rgba(0,0,0,.06)} .section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:0}.section h2{margin:0 0 8px;font:690 clamp(17px,1.55vw,21px)/1.2 Georgia,"Noto Serif",serif;letter-spacing:-.008em;color:#5d7281}
.article-body{max-width:var(--article-width);margin:0 auto;text-align:justify;text-justify:inter-word;hyphens:auto;overflow:visible}.article-body p{margin:0 0 15px}
.note{margin:18px 0;padding:14px 16px;border-radius:16px;background:var(--note);border:1px solid #e4d7ae;font:500 16px/1.58 system-ui,-apple-system,Segoe UI,Arial,sans-serif}.note .label{display:block;margin:0 0 6px;font:800 12px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#8d6d1c}
figure.media{margin:6px 0 16px;background:var(--figure);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.04)} figure.media.float-right,figure.media.float-left{width:min(var(--figure-width, var(--shape-width)), 42vw);margin-top:4px} figure.media.float-right{float:right;margin:4px 0 10px 20px} figure.media.float-left{float:left;margin:4px 20px 10px 0} figure.media.wide{clear:both;width:100%;max-width:100%;margin:22px 0}
.media-frame{position:relative;width:100%;background:#dde7ee;overflow:hidden;aspect-ratio:16/9}.media-frame.natural{aspect-ratio:auto;background:#fff;overflow:visible}.media-frame iframe,.media-frame img,.media-placeholder{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}.media-frame img{object-fit:cover}.media-frame.natural img{position:static;inset:auto;width:100%;height:auto;object-fit:contain;display:block}.media-placeholder{display:grid;place-items:center;text-align:center;padding:22px;background:linear-gradient(135deg,#f7fbfd,#e1ebf1);color:#465666;font:600 15px/1.5 system-ui,-apple-system,Segoe UI,Arial,sans-serif} figcaption{padding:12px 14px 14px;font:500 14px/1.55 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--muted);border-top:1px solid rgba(0,0,0,.07)}
.callout{margin:16px 0;padding:10px 12px;border:1px solid #d6e2eb;border-radius:14px;background:#f8fbfd;font:500 13px/1.45 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#29414f}.callout-title{margin:0 0 8px;font:800 12px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;text-transform:uppercase;letter-spacing:.08em;color:#2f698f}.callout-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:0 0 6px}.callout-label{font:700 11px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#5a7386;padding:4px 7px;border-radius:999px;background:#eef4f8;border:1px solid #d7e4ec}.callout-chip{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid #d6e2eb;font:700 11px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#203848}.callout-observe{margin-top:4px;padding-top:6px;border-top:1px dashed #cfdbe3}.callout-observe-title{font:700 11px/1 system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#7b5c2a;margin-right:6px}.callout-observe ul{margin:6px 0 0 18px;padding:0}.callout-observe li{margin:4px 0;font-style:italic}
.clear{clear:both}.status{margin:14px auto 0;max-width:var(--paper-width);color:var(--muted);font:500 14px/1.5 system-ui,-apple-system,Segoe UI,Arial,sans-serif}.print-scene-snapshot{display:none}
@media (max-width:900px){.mega-nav{grid-template-columns:repeat(2,minmax(0,1fr))}.chapter{padding:26px 18px 30px}figure.media.float-right,figure.media.float-left,figure.media.wide{float:none;width:100%;max-width:100%;margin:18px 0}.article-body{max-width:100%}}
@media print{@page{size:A4 portrait;margin:12mm} html,body{background:#fff!important;color:#000} body{font:18px/1.72 Georgia,"Noto Serif",serif!important;-webkit-print-color-adjust:exact;print-color-adjust:exact} .topbar,.status,.screen-only{display:none!important} body.print-frozen .page{width:var(--print-freeze-width)!important;max-width:none!important;margin:0!important;padding:22px 18px 80px!important;zoom:var(--print-freeze-scale)} body.print-frozen .hero,body.print-frozen .chapter,body.print-frozen figure.media{box-shadow:none!important;max-width:none!important} body.print-frozen figure.media[data-print-float="right"]{float:right!important;width:var(--print-figure-width)!important;margin:var(--print-figure-margin)!important} body.print-frozen figure.media[data-print-float="left"]{float:left!important;width:var(--print-figure-width)!important;margin:var(--print-figure-margin)!important} body.print-frozen figure.media[data-print-float="wide"]{float:none!important;width:var(--print-figure-width)!important;max-width:none!important;margin:var(--print-figure-margin)!important} body.print-frozen .media-frame{width:var(--print-frame-width)!important;height:var(--print-frame-height)!important;aspect-ratio:auto!important} body.print-frozen .media-frame iframe{display:none!important} body.print-frozen .media-frame::after{content:"[Η διαδραστική σκηνή εμφανίζεται στην ψηφιακή έκδοση]";position:absolute;inset:0;display:grid;place-items:center;padding:18px;color:#5e6d79;font:600 13px/1.4 system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#f4f6f8} body.print-frozen .media-frame.print-ready::after{content:none!important} body.print-frozen .print-scene-snapshot{display:block!important;width:100%!important;height:100%!important;object-fit:contain;background:#fff} body.print-frozen .note,body.print-frozen .callout,body.print-frozen figure.media,body.print-frozen .section h2{break-inside:avoid;page-break-inside:avoid} body.print-frozen .part-shell{break-before:page;page-break-before:always} body.print-frozen .part-shell:first-child{break-before:auto;page-break-before:auto}}
</style>
</head>
<body>
<div class="topbar screen-only"><div class="topbar-inner"><div class="topbar-main"><nav class="mega-nav" id="megaNav"></nav><div class="toolbar"><label>Προσανατολισμός<select id="printOrient"><option value="portrait">Portrait</option><option value="landscape">Landscape</option></select></label><button id="printBtn" type="button">Εκτύπωση / PDF</button></div></div></div></div>
<main class="page" id="pageRoot"><section class="hero" id="hero"></section><article class="chapter" id="chapter"></article></main><div class="status" id="status"></div>
<script>
const heroEl=document.getElementById('hero'); const chapterEl=document.getElementById('chapter'); const megaNavEl=document.getElementById('megaNav'); const statusEl=document.getElementById('status'); const pageRoot=document.getElementById('pageRoot'); const DEFAULT_JSON='chapter_content.json'; let printSnapshotsPrepared=false; const frozenNodes=[];
const setStatus=msg=>statusEl.textContent=msg||''; const escapeHtml=t=>String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); const normalizeMainTitle=t=>String(t||'').replace('Γέννηση και διάδοση του ηλεκτρομαγνητικού κύματος','Γέννηση και διάδοση του ΗΜ κύματος');
function normalizeAppSrc(url=''){return String(url||'').replace(/\.\.\/app\/em_wave_app\.html/g,'./index.html').replace(/\.\/app\/em_wave_app\.html/g,'./index.html').replace(/^\.\.\//,'./')}
function withCacheBust(url){try{const u=new URL(url,window.location.href);u.searchParams.set('_cb',Date.now());return u.toString()}catch(e){return url}}
function waitForImage(img){return new Promise(r=>{if(!img||img.complete)return r();img.addEventListener('load',r,{once:true});img.addEventListener('error',r,{once:true})})}
async function requestIframePrintSnapshot(iframe){if(!iframe) return null; try{const direct=iframe.contentWindow?.getBookPrintSnapshot||iframe.contentWindow?.EMWaveApp?.getPrintSnapshot; if(typeof direct==='function'){const out=await Promise.resolve(direct.call(iframe.contentWindow)); if(out) return out}}catch(_e){} return await new Promise(resolve=>{const requestId=`snap_${Date.now()}_${Math.random().toString(36).slice(2)}`; let done=false; const cleanup=()=>{if(done)return; done=true; window.removeEventListener('message',onMessage); clearTimeout(timer)}; const onMessage=(event)=>{if(event.source!==iframe.contentWindow) return; const data=event.data; if(!data||data.type!=='hm_print_snapshot'||data.requestId!==requestId) return; cleanup(); resolve(data.dataUrl||null)}; const timer=setTimeout(()=>{cleanup(); resolve(null)},4500); window.addEventListener('message',onMessage); try{iframe.contentWindow?.postMessage({type:'capturePrintSnapshot',requestId},'*')}catch(_e){cleanup(); resolve(null)}})}
function cleanupPrintSnapshots(){document.querySelectorAll('.print-scene-snapshot').forEach(i=>i.remove()); document.querySelectorAll('.media-frame.print-ready').forEach(el=>el.classList.remove('print-ready')); document.querySelectorAll('[data-print-ready="1"]').forEach(el=>el.removeAttribute('data-print-ready')); printSnapshotsPrepared=false}
async function preparePrintSnapshots(){cleanupPrintSnapshots(); const iframes=[...document.querySelectorAll('.media-frame iframe')]; await Promise.all(iframes.map(async iframe=>{const dataUrl=await requestIframePrintSnapshot(iframe); if(!dataUrl) return; const holder=iframe.parentElement; const img=document.createElement('img'); img.className='print-scene-snapshot'; img.alt='Στιγμιότυπο σκηνής'; img.src=dataUrl; holder.appendChild(img); holder.dataset.printReady='1'; await waitForImage(img)})); document.querySelectorAll('.media-frame').forEach(frame=>{const a=frame.querySelectorAll('iframe').length,b=frame.querySelectorAll('.print-scene-snapshot').length; if(a>0&&b>=a) frame.classList.add('print-ready')}); printSnapshotsPrepared=true}
function clearPrintFreeze(){while(frozenNodes.length){const {node,style}=frozenNodes.pop(); node.setAttribute('style',style)} document.body.classList.remove('print-frozen'); document.documentElement.style.removeProperty('--print-freeze-width'); document.documentElement.style.removeProperty('--print-freeze-scale')}
function freezeNode(node,mutator){frozenNodes.push({node,style:node.getAttribute('style')||''}); mutator(node)}
function printableWidthPx(orientation='portrait'){const mm=orientation==='landscape'?(297-24):(210-24); return (mm/25.4)*96}
function freezeLayoutForPrint(orientation='portrait'){clearPrintFreeze(); const pageRect=pageRoot.getBoundingClientRect(); const scale=Math.min(1, printableWidthPx(orientation)/pageRect.width); document.documentElement.style.setProperty('--print-freeze-width',`${pageRect.width}px`); document.documentElement.style.setProperty('--print-freeze-scale',String(scale)); document.querySelectorAll('figure.media').forEach(fig=>{const rect=fig.getBoundingClientRect(); const cs=getComputedStyle(fig); freezeNode(fig,node=>{node.dataset.printFloat=node.classList.contains('float-right')?'right':node.classList.contains('float-left')?'left':'wide'; node.style.setProperty('--print-figure-width',`${rect.width}px`); node.style.setProperty('--print-figure-margin',`${cs.marginTop} ${cs.marginRight} ${cs.marginBottom} ${cs.marginLeft}`)})}); document.querySelectorAll('.media-frame').forEach(frame=>{const rect=frame.getBoundingClientRect(); freezeNode(frame,node=>{node.style.setProperty('--print-frame-width',`${rect.width}px`); node.style.setProperty('--print-frame-height',`${rect.height}px`)})}); document.body.classList.add('print-frozen')}
function applyPrintPageStyle(orientation='portrait'){let styleEl=document.getElementById('printPageStyle'); if(!styleEl){styleEl=document.createElement('style'); styleEl.id='printPageStyle'; document.head.appendChild(styleEl)} const size=orientation==='landscape'?'A4 landscape':'A4 portrait'; styleEl.textContent=`@page{ size:${size}; margin:12mm; }`}
function safeStorage(){try{return window.localStorage}catch(_e){const mem={}; return {getItem:k=>Object.prototype.hasOwnProperty.call(mem,k)?mem[k]:null,setItem:(k,v)=>mem[k]=String(v),removeItem:k=>delete mem[k],clear:()=>Object.keys(mem).forEach(k=>delete mem[k])}}}
function setupPrintTools(){const printBtn=document.getElementById('printBtn'); const printOrient=document.getElementById('printOrient'); const storage=safeStorage(); const saved=storage.getItem('hmBookPrintOrient'); if(saved) printOrient.value=saved; printOrient.addEventListener('change',()=>storage.setItem('hmBookPrintOrient',printOrient.value)); printBtn.addEventListener('click',async()=>{const orientation=printOrient.value||'portrait'; storage.setItem('hmBookPrintOrient',orientation); applyPrintPageStyle(orientation); setStatus('Ετοιμάζονται στατικά στιγμιότυπα και παγώνει η σελιδοποίηση…'); try{await preparePrintSnapshots(); freezeLayoutForPrint(orientation)}catch(err){console.warn(err)} setStatus(''); window.print()}); window.addEventListener('afterprint',()=>{clearPrintFreeze(); cleanupPrintSnapshots(); setStatus('')})}
function renderHero(meta={}){const title=normalizeMainTitle(meta.title||''); heroEl.innerHTML=`${meta.eyebrow?`<p class="eyebrow">${meta.eyebrow}</p>`:''}${title?`<h1>${title}</h1>`:''}${meta.subtitle?`<p class="subtitle">${meta.subtitle}</p>`:''}${meta.notes?.length?`<div class="intro-note">${meta.notes[0]}</div>`:''}`; document.title=title||'Ανάγνωσμα Η/Μ κύματος'}
function renderNav(sections=[],parts=[]){const partsList=(parts&&parts.length)?parts:sections.map(s=>({id:s.id,title:s.title,sectionIds:[s.id]})); megaNavEl.innerHTML=partsList.map(part=>`<div class="menu-item" data-part-id="${part.id||''}"><a class="menu-trigger" href="#${part.id||part.sectionIds?.[0]||''}">${part.title||''}</a></div>`).join(''); const update=()=>{const y=window.scrollY+140; let current=''; for(const part of partsList){const el=document.getElementById(part.id||part.sectionIds?.[0]); if(el&&el.offsetTop<=y) current=part.id||''} megaNavEl.querySelectorAll('.menu-item').forEach(n=>n.classList.toggle('active',n.dataset.partId===current))}; window.addEventListener('scroll',update,{passive:true}); window.addEventListener('resize',update,{passive:true}); update()}
const placementClass=block=>{const p=String(block?.placement||'').toLowerCase(); return p==='left'?'float-left':p==='right'?'float-right':'wide'};
function sceneAspect(block){const src=String(block.singleSrc||''); let layout=''; try{const u=new URL(src,window.location.href); layout=(u.searchParams.get('layout')||'').toLowerCase()}catch(_e){const m=src.match(/[?&]layout=([^&]+)/i); layout=m?decodeURIComponent(m[1]).toLowerCase():''} const g=146.2,r=219.3,c=34; if(layout==='rod_only') return 340/(r+c); if(layout==='rod_1graph') return 340/(r+g+c); if(layout==='rod_2graphs') return 340/(r+g*2+c); if(layout==='rod_3graphs') return 340/(r+g*3+c); return 16/9}
function renderScene(block){const fig=document.createElement('figure'); fig.className=`media ${placementClass(block)}`; fig.style.setProperty('--figure-width',`${block.frameWidth||340}px`); const frame=document.createElement('div'); frame.className='media-frame'; frame.style.aspectRatio=String(sceneAspect(block)); const iframe=document.createElement('iframe'); iframe.loading='lazy'; iframe.referrerPolicy='no-referrer'; iframe.allow='fullscreen'; iframe.src=withCacheBust(normalizeAppSrc(block.singleSrc||'')); frame.appendChild(iframe); fig.appendChild(frame); if(!block.hideCaption){const cap=document.createElement('figcaption'); cap.textContent=block.caption||block.title||'Σκηνή'; fig.appendChild(cap)} return fig}
function renderFigure(block){const fig=document.createElement('figure'); fig.className=`media ${placementClass(block)}`; fig.style.setProperty('--figure-width',`${block.frameWidth||340}px`); const frame=document.createElement('div'); frame.className=`media-frame ${block.aspect==='natural'?'natural':''}`.trim(); const img=document.createElement('img'); img.alt=block.alt||block.title||'Εικόνα'; img.src=block.src||''; img.onerror=()=>{img.remove(); const ph=document.createElement('div'); ph.className='media-placeholder'; ph.innerHTML=`<div><strong>${escapeHtml(block.title||'Εικόνα')}</strong><br>Το αρχείο εικόνας δεν βρέθηκε στο test bundle.</div>`; frame.appendChild(ph)}; frame.appendChild(img); fig.appendChild(frame); if(!block.hideCaption){const cap=document.createElement('figcaption'); cap.textContent=block.caption||block.title||'Εικόνα'; fig.appendChild(cap)} return fig}
function renderNote(block){const d=document.createElement('div'); d.className='note'; d.innerHTML=`${block.label?`<span class="label">${block.label}</span>`:''}${block.html||''}`; return d}
function renderParagraph(block){const p=document.createElement('p'); p.innerHTML=block.html||''; return p}
function renderCallout(block){const d=document.createElement('div'); d.className='callout'; d.innerHTML=`<div class="callout-title">${block.title||'Δοκίμασε'}</div><div class="callout-row"><span class="callout-label">${block.setupLabel||'Ρύθμισε'}</span>${(block.setupChips||[]).map(t=>`<span class="callout-chip">${t}</span>`).join('')}</div><div class="callout-row"><span class="callout-label">${block.pressLabel||'Πίεσε'}</span>${(block.pressChips||[]).map(t=>`<span class="callout-chip">${t}</span>`).join('')}</div><div class="callout-observe"><span class="callout-observe-title">${block.observeTitle||'Παρατήρησε'}</span><ul>${(block.observeItems||[]).map(t=>`<li>${t}</li>`).join('')}</ul></div>`; return d}
function renderBlock(block){if(block.type==='paragraph') return renderParagraph(block); if(block.type==='note') return renderNote(block); if(block.type==='figure') return renderFigure(block); if(block.type==='scene') return renderScene(block); if(block.type==='interactive_callout') return renderCallout(block); if(block.type==='clear'){const d=document.createElement('div'); d.className='clear'; return d} const d=document.createElement('div'); d.textContent=`Άγνωστο block: ${block.type}`; return d}
function renderContent(data){renderHero(data.meta||{}); renderNav(data.sections||[],data.parts||[]); const byId=Object.fromEntries((data.sections||[]).map(sec=>[sec.id,sec])); const parts=(data.parts&&data.parts.length)?data.parts:[{id:'all',title:'Περιεχόμενο',sectionIds:(data.sections||[]).map(s=>s.id)}]; chapterEl.innerHTML=''; for(const part of parts){const shell=document.createElement('section'); shell.className='part-shell'; shell.id=part.id||''; shell.innerHTML=`<p class="part-kicker">Μέρος</p><h2 class="part-title-main">${part.title||''}</h2>`; for(const secId of (part.sectionIds||[])){const sec=byId[secId]; if(!sec) continue; const secEl=document.createElement('section'); secEl.className='section'; secEl.id=sec.id; secEl.innerHTML=`<h2>${sec.title||''}</h2>`; const body=document.createElement('div'); body.className='article-body'; for(const block of (sec.blocks||[])) body.appendChild(renderBlock(block)); secEl.appendChild(body); shell.appendChild(secEl)} chapterEl.appendChild(shell)}}
async function loadData(){const res=await fetch(DEFAULT_JSON,{cache:'no-store'}); if(!res.ok) throw new Error(`Αποτυχία φόρτωσης ${DEFAULT_JSON}`); return await res.json()}
setupPrintTools(); loadData().then(data=>{renderContent(data); setStatus('')}).catch(err=>{console.error(err); setStatus(`Σφάλμα φόρτωσης: ${err.message}`)})
</script>
</body></html>
