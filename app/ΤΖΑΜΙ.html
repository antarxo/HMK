<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Παραγωγή Διάδοση και Λήψη Η/Μ Κύματος</title>
<style>
  :root{ --bg:#0b0f14; --panel:#111822; --text:#e8eef7; --muted:#9aa8bc; --gap:12px; --pad:12px; --cardBorder:rgba(255,255,255,.08); --topBg:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)), var(--panel); --cardBg:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)), var(--panel); --footBg:transparent; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:14px/1.35 system-ui,Segoe UI,Arial,sans-serif;overflow:hidden}
  .app{display:grid;grid-template-rows:auto 1fr;height:100dvh;min-height:100dvh}
  .top{padding:6px 10px;background:var(--topBg);border-bottom:1px solid var(--cardBorder);display:flex;justify-content:center;align-items:center}
  .title{font-size:19px;font-weight:700;display:flex;align-items:baseline;justify-content:center;gap:10px;text-align:center}
  .sub{color:var(--muted);margin-top:0;font-size:11px;font-weight:500;white-space:nowrap}
  .titleBar{display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
  .langSwitch{display:flex;align-items:center;gap:4px;flex:0 0 auto}
  .regionSwitch{display:flex;align-items:center;gap:4px;flex:0 0 auto}
  .langBtn,.regionBtn{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);padding:3px 7px;border-radius:8px;cursor:pointer;font-size:11px;line-height:1;font-weight:700;min-width:32px}
  .langBtn.active,.regionBtn.active{background:rgba(79,168,216,.18);border-color:rgba(79,168,216,.42);color:#e7f6ff}
  .regionBtn{min-width:64px}
  button[disabled]{opacity:.45;cursor:not-allowed}
  .main{display:block;padding:2px;min-height:0;overflow:hidden}
  .card{background:var(--cardBg);border:1px solid var(--cardBorder);border-radius:14px;overflow:hidden;min-height:0;min-width:0}
  .card h3{margin:0;padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px}
  .card .body{padding:4px}
  .row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;margin:8px 0}
  .row label{color:var(--muted);font-size:12px}
  .inlineVal{display:inline-block;min-width:3.2em;margin-left:6px;color:var(--text);font-weight:700}
  input[type="range"]{width:min(190px,34vw)}
  select{width:min(190px,34vw);background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:4px 6px}
  .viewport{position:relative;min-height:0;height:100%}
  #stage{position:absolute;inset:0}
  .leftOverlayStack{position:absolute;left:4px;top:2px;bottom:2px;z-index:20;display:flex;flex-direction:column;gap:1px;align-items:flex-start;pointer-events:none;width:min(248px,25vw);min-height:0}
  .machineHud{position:relative;left:auto;top:auto;bottom:auto;z-index:20;display:flex;flex-direction:column;gap:2px;align-items:flex-start;pointer-events:none;max-width:none;width:100%;margin-top:auto}
  .machineHud .dpad,.machineHud button,.machineHud input,.machineHud label{pointer-events:auto}
  .hudGroup{display:flex;flex-direction:column;gap:1px;padding:2px;border:1px solid rgba(255,255,255,.10);border-radius:10px;background:rgba(10,14,20,.34);backdrop-filter:blur(2px);pointer-events:auto;width:100%}
  .transportRow{display:grid;grid-template-columns:repeat(6,32px);gap:3px;align-items:center;justify-content:center;width:100%}
  .transportRow button{width:32px;height:30px;min-width:32px;padding:0;font-size:16px;line-height:1;border-radius:9px;display:flex;align-items:center;justify-content:center}
  .navDock{display:flex;gap:4px;align-items:center;justify-content:center;width:100%}
  .statPad{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:0;min-width:40px;min-height:82px}
  .statPad button{width:22px;height:16px;padding:0;font-size:11px;line-height:1;border-radius:7px}
  .statReadout{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:38px;min-height:24px;padding:1px 2px;border:1px solid rgba(255,255,255,.12);border-radius:7px;background:rgba(255,255,255,.05);font-size:10px;font-weight:700;line-height:1.0}
  .statReadout .mini{font-size:8px;color:var(--muted);font-weight:600;letter-spacing:.02em}
  .statReadout .val{font-size:10px;color:var(--text)}
  .controlGrid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
  .controlGrid button{min-width:0;padding:4px 6px;font-size:16px;line-height:1;white-space:nowrap;border-radius:9px;display:flex;align-items:center;justify-content:center;min-height:30px}
  .controlGrid .span2{grid-column:1 / span 2}
  .modeGrid{display:grid;grid-template-columns:auto minmax(0,.82fr) minmax(0,1.18fr);gap:3px}
  .modeGrid button{min-width:0;padding:5px 6px;font-size:10px;white-space:nowrap;border-radius:9px}
  .modeGrid .compactModeBtn{padding:5px 4px;font-size:10px}
  .modeGrid .currentMiniBtn{display:flex;align-items:center;justify-content:center;gap:3px;padding:5px 7px;font-size:12px;min-width:40px}
  .modeGrid .currentMiniBtn .currentGlyph{font-weight:700;letter-spacing:-0.01em}
  .modeGrid .currentMiniBtn .dirGlyph{font-size:10px;transform:translateY(1px)}
  .modeRowWide{grid-column:1 / span 3;display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:4px;align-items:center}
  .modeGrid .modeHalf{grid-column:span 1}
  .modeGrid .modeHalfLeft{grid-column:1 / span 1}
  .modeGrid .modeHalfRight{grid-column:2 / span 2}
  .miniCheck{display:flex;align-items:center;gap:3px;padding:0 2px;font-size:11px;color:var(--text)}
  .miniCheck input{margin:0}
  .displayGrid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
  .planesRow{display:grid;grid-template-columns:1fr 1fr;gap:3px}
  .hStatPad{display:grid;grid-template-columns:18px minmax(0,1fr) 18px;gap:3px;align-items:center}
  .hStatPad button{width:18px;height:28px;padding:0;font-size:11px;line-height:1;border-radius:7px;display:flex;align-items:center;justify-content:center}
  .statReadout.horiz{min-width:0;min-height:28px;padding:2px 4px}
  .statReadout.horiz .mini{font-size:8px}
  .statReadout.horiz .val{font-size:10px}

  .presetActive{background:rgba(79,168,216,.18)!important;border-color:rgba(79,168,216,.42)!important;color:#e7f6ff}
  .controls{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);padding:4px 6px;border-radius:8px;cursor:pointer;font-size:10px}
  .modeGrid button,.displayGrid button{padding:4px 6px;font-size:10px}
  button:hover{background:rgba(255,255,255,.1)}
  .dpad{display:grid;grid-template-columns:repeat(3,26px);grid-template-rows:repeat(3,26px);gap:1px;justify-content:center;align-items:center}
  .dpad button,.centerDot{padding:0;border-radius:7px;font-size:12px;font-weight:700}
  .centerDot{display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06)}
  .legend{display:grid;gap:6px;margin-top:10px;font-size:12px}
  .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:7px;vertical-align:-2px}
  .foot{display:none}
  .badge{display:inline-block;padding:3px 7px;border-radius:999px;background:rgba(79,168,216,.14);border:1px solid rgba(79,168,216,.28);color:#d8f1ff;font-size:11px;margin-left:8px}
  .paperWrap{position:relative;height:100%;min-height:0;border-radius:10px;overflow:hidden}
  .paperWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .graphPanel{border:1px solid rgba(255,255,255,.10);border-radius:12px;background:rgba(10,14,20,.22);backdrop-filter:blur(2px);overflow:hidden;pointer-events:none}

  .bookGraphStack{position:absolute;left:0;top:0;z-index:22;display:none;gap:1px;pointer-events:none}
  .bookGraphStack .graphPanel{width:100%;max-width:none;height:auto;min-height:0;background:rgba(10,14,20,.22);backdrop-filter:blur(2px)}
  .graphPanel canvas{opacity:.96}
  .vqiOverlay{width:100%;display:grid;flex:1 1 auto;min-height:0;grid-template-rows:repeat(3,minmax(0,1fr));gap:1px}
  .topWaveOverlay{position:absolute;left:50%;right:auto;top:2px;transform:translateX(-50%);z-index:18;display:grid;grid-template-columns:repeat(2,minmax(0,248px));gap:6px;pointer-events:none;width:min(502px,52vw)}
  .topWaveOverlay .graphPanel{min-height:102px;height:min(124px,16vh)}
  @media (max-width:1080px){ .leftOverlayStack{width:min(250px,31vw)} .topWaveOverlay{width:min(506px,62vw);grid-template-columns:repeat(2,minmax(0,250px))} }
  @media (max-width:900px){ html,body{overflow:auto}.app{height:auto;min-height:100dvh}.main{overflow:visible}.viewport{min-height:72vh;height:min(82vh,920px)} .leftOverlayStack{left:4px;top:2px;bottom:2px;width:min(250px,44vw)} .vqiOverlay{grid-template-rows:repeat(3,minmax(0,1fr));gap:1px} .topWaveOverlay{left:50%;right:auto;top:2px;transform:translateX(-50%);width:min(506px,92vw);grid-template-columns:1fr 1fr;gap:4px} .topWaveOverlay .graphPanel{height:min(110px,14.5vh)} }
  @media (max-width:640px){ .leftOverlayStack{top:2px;bottom:2px;width:min(96vw,248px)} .vqiOverlay{grid-template-rows:repeat(3,minmax(0,1fr));gap:1px} .topWaveOverlay{grid-template-columns:1fr 1fr;left:50%;right:auto;transform:translateX(-50%);width:min(506px,96vw);gap:4px} .topWaveOverlay .graphPanel{height:min(102px,13.6vh)} }

  .focusMiniControls{position:absolute;left:8px;right:8px;top:auto;bottom:8px;z-index:42;display:flex;gap:2px;align-items:center;padding:3px 4px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(10,14,20,.52);backdrop-filter:blur(4px);max-width:none;flex-wrap:nowrap;justify-content:flex-start;overflow:hidden;white-space:nowrap}
  .focusMiniControls[hidden]{display:none!important}
  .focusMiniControls button{min-width:24px;min-height:22px;height:22px;font-size:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;padding:0 4px}
  .focusMiniControls .miniLabel{font-size:10px;color:var(--muted);padding-right:2px;white-space:nowrap;flex:0 0 auto}
  .focusMiniControls .miniExtras{display:flex;gap:2px;align-items:center;flex-wrap:nowrap;justify-content:flex-start;flex:1 1 auto;min-width:0;overflow:hidden}
  .focusMiniControls .miniToggle{min-width:24px;min-height:22px;height:22px;font-size:9px;padding:0 3px;letter-spacing:-0.02em;flex:0 0 auto}
  .focusMiniControls .miniToggle.active{background:rgba(79,168,216,.18);border-color:rgba(79,168,216,.42);color:#e7f6ff}
  body.focus-mode .top{display:none}
  body.focus-mode .main{padding:0}
  body.focus-mode .card{border:none;border-radius:0;background:transparent}
  body.focus-mode .viewport{height:100dvh}
  body.focus-mode .leftOverlayStack{left:12px;top:12px;bottom:auto;width:min(308px,44vw);gap:6px}
  body.focus-mode .topWaveOverlay{top:12px;width:min(560px,64vw)}
  body.focus-mode .machineHud{display:none}
  body.focus-mode .vqiOverlay{gap:6px}
  body.focus-mode .graphPanel{background:rgba(10,14,20,.32)}
  body.focus-stage-hidden #stage{opacity:0;pointer-events:none}
  body.focus-hide-topwaves .topWaveOverlay{display:none!important}
  body.focus-hide-leftstack .leftOverlayStack{display:none!important}
  body.focus-controls-none .focusMiniControls{display:none!important}
  body.focus-controls-minimal .focusMiniControls{display:flex}
  body.focus-controls-full .focusMiniControls{display:flex}
  @media (max-width:900px){ body.focus-mode .leftOverlayStack{width:min(340px,56vw)} body.focus-mode .topWaveOverlay{width:min(560px,92vw)} }
  @media (max-width:640px){ body.focus-mode .leftOverlayStack{left:10px;right:10px;width:auto} body.focus-mode .topWaveOverlay{left:10px;right:10px;transform:none;width:auto} .focusMiniControls{left:6px;right:6px;bottom:6px;top:auto;justify-content:flex-start;max-width:none} }

  body.focus-mode .viewport{height:100dvh}
  body.focus-mode .focusMiniControls{left:8px;right:8px;bottom:8px;top:auto}
  body.focus-mode[data-focus="rod_v"] #stage,
  body.focus-mode[data-focus="rod_vq"] #stage,
  body.focus-mode[data-focus="rod_vqi"] #stage{
    left:16px; top:16px; right:16px; bottom:43vh;
  }
  body.focus-mode[data-focus="rod_v"] .leftOverlayStack,
  body.focus-mode[data-focus="rod_vq"] .leftOverlayStack,
  body.focus-mode[data-focus="rod_vqi"] .leftOverlayStack{
    left:16px; right:16px; top:auto; bottom:58px; width:auto;
    transform:none; justify-content:flex-start; gap:10px;
  }
  body.focus-mode[data-focus="rod_v"] .vqiOverlay,
  body.focus-mode[data-focus="rod_vq"] .vqiOverlay,
  body.focus-mode[data-focus="rod_vqi"] .vqiOverlay{gap:10px}
  body.focus-mode[data-focus="rod_v"] .graphPanel,
  body.focus-mode[data-focus="rod_vq"] .graphPanel,
  body.focus-mode[data-focus="rod_vqi"] .graphPanel{
    min-height:0;
    height:calc(14vh - 8px);
    flex:0 0 auto;
  }
  body.focus-mode[data-focus="rod_v"] .topWaveOverlay,
  body.focus-mode[data-focus="rod_vq"] .topWaveOverlay,
  body.focus-mode[data-focus="rod_vqi"] .topWaveOverlay{
    display:none!important;
  }

  body.focus-mode[data-focus="graphs_qieb"] #stage{display:none}
  body.focus-mode[data-focus="graphs_qieb"] .leftOverlayStack{
    left:16px; top:16px; bottom:16px; width:calc(50% - 24px);
    justify-content:flex-start; gap:12px;
  }
  body.focus-mode[data-focus="graphs_qieb"] .topWaveOverlay{
    left:auto; right:16px; top:16px; transform:none; width:calc(50% - 24px);
    grid-template-columns:1fr; gap:12px;
  }
  body.focus-mode[data-focus="graphs_qieb"] .vqiOverlay{gap:12px}
  body.focus-mode[data-focus="graphs_qieb"] .graphPanel{
    min-height:0;
    height:calc(50dvh - 34px);
  }

  body.focus-mode[data-focus="rod_e_propagation"] #stage{
    left:16px; top:16px; bottom:16px; right:344px;
  }
  body.focus-mode[data-focus="rod_e_propagation"] .leftOverlayStack{
    display:none!important;
  }
  body.focus-mode[data-focus="rod_e_propagation"] .topWaveOverlay{
    left:auto; right:16px; top:16px; transform:none; width:312px; grid-template-columns:1fr;
  }
  body.focus-mode[data-focus="rod_e_propagation"] .topWaveOverlay .graphPanel{
    height:calc(100dvh - 88px);
    min-height:0;
  }

  @media (max-width: 980px){
    body.focus-mode[data-focus="rod_v"] #stage,
    body.focus-mode[data-focus="rod_vq"] #stage,
    body.focus-mode[data-focus="rod_vqi"] #stage,
    body.focus-mode[data-focus="rod_e_propagation"] #stage{
      left:12px; right:12px; top:12px; bottom:50vh;
    }
    body.focus-mode[data-focus="rod_v"] .leftOverlayStack,
    body.focus-mode[data-focus="rod_vq"] .leftOverlayStack,
    body.focus-mode[data-focus="rod_vqi"] .leftOverlayStack{
      left:12px; right:12px; top:auto; bottom:60px; width:auto;
    }
    body.focus-mode[data-focus="rod_e_propagation"] .topWaveOverlay{
      left:12px; right:12px; top:auto; bottom:60px; width:auto; transform:none;
    }
    body.focus-mode[data-focus="graphs_qieb"] .leftOverlayStack,
    body.focus-mode[data-focus="graphs_qieb"] .topWaveOverlay{
      left:12px; right:12px; width:auto; transform:none;
    }
    body.focus-mode[data-focus="graphs_qieb"] .leftOverlayStack{
      top:12px; bottom:auto;
    }
    body.focus-mode[data-focus="graphs_qieb"] .topWaveOverlay{
      top:auto; bottom:60px; grid-template-columns:1fr 1fr;
    }
    body.focus-mode[data-focus="graphs_qieb"] .graphPanel{
      height:min(26vh, 210px);
    }
  }
  @media (max-width: 640px){
    body.focus-mode[data-focus="rod_v"] #stage,
    body.focus-mode[data-focus="rod_vq"] #stage,
    body.focus-mode[data-focus="rod_vqi"] #stage,
    body.focus-mode[data-focus="rod_e_propagation"] #stage{
      bottom:58vh;
    }
    body.focus-mode[data-focus="rod_v"] .leftOverlayStack,
    body.focus-mode[data-focus="rod_vq"] .leftOverlayStack,
    body.focus-mode[data-focus="rod_vqi"] .leftOverlayStack{
      bottom:56px;
    }
    body.focus-mode[data-focus="graphs_qieb"] .topWaveOverlay{
      grid-template-columns:1fr;
    }
  }

</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="titleBar">
      <div class="langSwitch" aria-label="Language selector">
        <button id="langEl" class="langBtn active" type="button">EL</button>
        <button id="langEn" class="langBtn" type="button">EN</button>
      </div>
      <div class="regionSwitch" aria-label="Region selector">
        <button id="regionNear" class="regionBtn active" type="button" data-i18n="region_near">Σχολικό</button>
        <button id="regionNearAtt" class="regionBtn" type="button" data-i18n="region_near_att">Σχολικό+</button>
        <button id="regionFar" class="regionBtn" type="button" data-i18n="region_far">ΗΜ κύμα</button>
      </div>
      <div class="title"><span data-i18n="app_title">Παραγωγή Διάδοση και Λήψη Η/Μ Κύματος</span> <span class="sub">© antarxo, 2026</span></div>
    </div>
  </div>
  <div class="main">
    <div class="card viewport">
      <div id="stage"></div>
      <div class="topWaveOverlay">
        <div class="graphPanel"><div class="paperWrap"><canvas id="eGraphPaper"></canvas></div></div>
        <div class="graphPanel"><div class="paperWrap"><canvas id="bGraphPaper"></canvas></div></div>
      </div>
      <div class="leftOverlayStack">
        <div class="vqiOverlay">
          <div class="graphPanel"><div class="paperWrap"><canvas id="vGraphPaper"></canvas></div></div>
          <div class="graphPanel"><div class="paperWrap"><canvas id="qGraphPaper"></canvas></div></div>
          <div class="graphPanel"><div class="paperWrap"><canvas id="iGraphPaper"></canvas></div></div>
        </div>
      <div class="machineHud">
        <div class="hudGroup">
          <div class="navDock">
            <div class="statPad">
              <button id="zoomIn" data-i18n-aria="zoom_in" aria-label="Zoom in">▲</button>
              <div class="statReadout"><span class="mini" data-i18n="zoom">Zoom</span><span class="val" id="zoomPct">100%</span></div>
              <button id="zoomOut" data-i18n-aria="zoom_out" aria-label="Zoom out">▼</button>
              <input id="zoom" type="range" min="0" max="1800" value="960" data-i18n-aria="zoom" aria-label="Zoom" style="display:none">
            </div>
            <div class="statPad">
              <button id="speedUp" data-i18n-aria="faster" aria-label="Faster">▲</button>
              <div class="statReadout"><span class="mini" data-i18n="speed_short">Ταχ/τα</span><span class="val" id="speedPct">30%</span></div>
              <button id="speedDown" data-i18n-aria="slower" aria-label="Slower">▼</button>
            </div>
            <div class="dpad">
              <div></div><button id="up">▲</button><div></div>
              <button id="left">◀</button><div class="centerDot" id="resetView">•</div><button id="right">▶</button>
              <div></div><button id="down">▼</button><div></div>
            </div>
          </div>
          <div class="transportRow">
            <button id="qBack" data-i18n-title="back_T8" data-i18n-aria="back_T8" title="Πίσω κατά T/8" aria-label="Πίσω κατά T/8">⏪</button>
            <button id="stepBack" data-i18n-title="step_back" data-i18n-aria="step_back" title="Βήμα πίσω" aria-label="Βήμα πίσω">⏴</button>
            <button id="playBtn" data-i18n-title="play_pause" data-i18n-aria="play_pause" title="Έναρξη / Παύση" aria-label="Έναρξη / Παύση">❚❚</button>
            <button id="resetBtn" data-i18n-title="reset" data-i18n-aria="reset" title="Reset" aria-label="Reset">⏮</button>
            <button id="stepFwd" data-i18n-title="step_forward" data-i18n-aria="step_forward" title="Βήμα μπροστά" aria-label="Βήμα μπροστά">⏵</button>
            <button id="qFwd" data-i18n-title="forward_T8" data-i18n-aria="forward_T8" title="Μπροστά κατά T/8" aria-label="Μπροστά κατά T/8">⏩</button>
          </div>
        </div>
        <div class="hudGroup">
          <div class="modeGrid">
            <button id="toggleCurrentBtn" class="currentMiniBtn" type="button" title="Βέλος ρεύματος" aria-label="Βέλος ρεύματος"><span class="currentGlyph">Ι</span><span class="dirGlyph">↓</span></button>
            <button id="modeRod" class="compactModeBtn" data-i18n="mode_dipole">Δίπολο</button>
            <button id="waveModeArrows" class="compactModeBtn" data-i18n="mode_arrows">Ευθεία Διάδοση</button>
            <div class="modeRowWide">
              <button id="modeSource" data-i18n="mode_lines_eb">Δυναμικές γραμμές</button>
              <label class="miniCheck"><input id="showE" type="checkbox" checked> E</label>
              <label class="miniCheck"><input id="showB" type="checkbox" checked> B</label>
            </div>

function buttonLabelForAllowedControl(key){
  const map = {
    toggleCurrent:'I↓', toggleCharges:'q', toggleE:'E', toggleB:'B', toggleLinear:'↔', toggleELines:'Εδ', toggleBLines:'Βδ', toggleELinear:'E→', toggleBLinear:'B→',
    toggleGraphV:'V-t', toggleGraphQ:'q-t', toggleGraphI:'i-t', toggleGraphE:'E-t', toggleGraphB:'B-t'
  };

}
function toggleAllowedBookControl(key){
  if(!activeBookSceneState) return;
  const graphMap = { toggleGraphV:'V', toggleGraphQ:'Q', toggleGraphI:'I', toggleGraphE:'E', toggleGraphB:'B' };
  switch(key){
    case 'toggleCurrent':
      ui.showCurrent.checked = !ui.showCurrent.checked;
      break;
    case 'toggleCharges':
      ui.showParticles.checked = !ui.showParticles.checked;
      break;
    case 'toggleE':
    case 'toggleELines': {
      const next = !ui.showE.checked;
      ui.showE.checked = next;
      if(next){
        applyMainMode('lines', true);
      } else if(!ui.showB.checked){
        applyMainMode('rod', true);
      }
      break;
    }
    case 'toggleB':
    case 'toggleBLines': {
      const next = !ui.showB.checked;
      ui.showB.checked = next;
      if(next){
        applyMainMode('lines', true);
      } else if(!ui.showE.checked){
        applyMainMode('rod', true);
      }
      break;
    }
    default:
      if(graphMap[key]){
        const target = graphMap[key];
        const available = activeBookSceneState.availableGraphs || ['V','Q','I','E','B'];
        if(!available.includes(target)) break;
        const list = [...(activeBookSceneState.graphs || [])].filter(k => available.includes(k));
        const cap = Math.max(0, activeBookSceneState.maxGraphSlots || 3);
        const idx = list.indexOf(target);
        if(idx >= 0){
          list.splice(idx,1);
        } else {
          if(cap > 0 && list.length >= cap) list.shift();
          if(cap > 0) list.push(target);
        }
        activeBookSceneState.graphs = list;
        const cfg = getFocusPresetConfig('book_multiscene') || FOCUS_PRESETS.book_multiscene;
        relayoutGraphContainers(cfg);
      }
      break;
  }
  applyUI();
  syncMiniExtraControls();
}

    case 'toggleCharges': return !!ui.showParticles.checked;
    case 'toggleE':
    case 'toggleELines': return !!ui.showE.checked;
    case 'toggleB':
    case 'toggleBLines': return !!ui.showB.checked;
    case 'toggleGraphV': return (activeBookSceneState?.graphs || []).includes('V');
    case 'toggleGraphQ': return (activeBookSceneState?.graphs || []).includes('Q');
    case 'toggleGraphI': return (activeBookSceneState?.graphs || []).includes('I');

function formatQuarterLabel(qCount){
  if(qCount === 0) return '0';
  if(qCount % 4 === 0){

  }
  if(qCount % 2 === 0){
    const n = qCount / 2;
    return n === 1 ? 'T/2' : `${n}T/2`;
  }
  return qCount === 1 ? 'T/4' : `${qCount}T/4`;
}

function disposeGroup(group){
  while(group.children.length){
    const child = group.children.pop();
    group.remove(child);
    child.traverse(obj => {
      if(obj.geometry) obj.geometry.dispose();
      if(obj.material){
        if(Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
  }
}

function frontQuarterIndex(tEmit){
  const eps = 1e-9;
  if(tEmit > 0 && Math.abs(tEmit - Math.round(tEmit)) < eps) return 3;
  const local = ((tEmit % 1) + 1) % 1;
  return Math.min(3, Math.floor(local * 4));
}
function getPulseScaleX(age){ return (E_TARGET_TOTAL_WIDTH * age) / (2 * E_BIRTH_HALF_WIDTH); }
function getPulseScaleY(age){ return (ROD_LENGTH + (E_TARGET_TOTAL_HEIGHT - ROD_LENGTH) * age) / ROD_LENGTH; }
function localToWorldXY(scaleX, scaleY, xLocal, yLocal){
  return new THREE.Vector3(xLocal * WORLD_PER_LOCAL * scaleX, yLocal * WORLD_PER_LOCAL * scaleY, 0);
}
function cubicPoint(p0,c1,c2,p3,t){
  const mt = 1 - t;
  return [
    mt*mt*mt*p0[0] + 3*mt*mt*t*c1[0] + 3*mt*t*t*c2[0] + t*t*t*p3[0],
    mt*mt*mt*p0[1] + 3*mt*mt*t*c1[1] + 3*mt*t*t*c2[1] + t*t*t*p3[1]
  ];
}
function makeLobePoints(scaleX, scaleY, sx, sy){
  const pts = [];
  const steps = LOBE_STEPS;
  const p0 = [0 * sx, -142 * sy];
  const c1 = [18 * sx, -158 * sy];
  const c2 = [45 * sx, -178 * sy];
  const p3 = [63 * sx, -178 * sy];
  const d1 = [112 * sx, -178 * sy];
  const d2 = [159 * sx, -122 * sy];
  const p6 = [159 * sx, 0 * sy];
  for(let i=0;i<=steps;i++){
    const t = i / steps;
    let x, y;
    if(t <= 0.5){ [x,y] = cubicPoint(p0, c1, c2, p3, t / 0.5); }
    else { [x,y] = cubicPoint(p3, d1, d2, p6, (t - 0.5) / 0.5); }
    pts.push(localToWorldXY(scaleX, scaleY, x, y));
  }
  return pts;
}

function findDiagonalAnchorData(pts, scaleX, scaleY){
  // Requested anchor on the UPPER-RIGHT lobe:
  // rectangle lower-left corner = rod center (0,0),
  // opposite corner = (159*scaleX, 178*scaleY).
  // So the diagonal is y = m x with m = (178*scaleY)/(159*scaleX).
  const m = (178 * scaleY) / Math.max(1e-9, 159 * scaleX);
  let idx = -1;
  let tSeg = 0.5;

  for(let i=0;i<pts.length-1;i++){
    const p0 = pts[i], p1 = pts[i+1];
    const f0 = p0.y - m * p0.x;
    const f1 = p1.y - m * p1.x;
    if(Math.abs(f0) < 1e-9){ idx = i; tSeg = 0; break; }
    if(f0 === 0 || f0 * f1 <= 0){
      const denom = (f0 - f1);
      tSeg = Math.abs(denom) < 1e-9 ? 0.5 : (f0 / denom);
      idx = i;
      break;
    }
  }

  if(idx < 0){
    // Fallback: nearest point to the diagonal
    let best = 1, bestErr = Infinity;
    for(let i=1;i<pts.length-1;i++){
      const err = Math.abs(pts[i].y - m * pts[i].x);
      if(err < bestErr){ bestErr = err; best = i; }
    }
    idx = Math.max(1, Math.min(pts.length-2, best));
    tSeg = 0.0;
  }

  const a = pts[idx], b = pts[idx+1];
  const pos = new THREE.Vector3(
    a.x + (b.x - a.x) * tSeg,
    a.y + (b.y - a.y) * tSeg,

function addEArrowCones(front){
  if((front.arrowLen || 0) <= 0.25) return;
  const age = front.age;
  if(age < 0 || age > getEmitPeriods()) return;
  const fade = Math.exp(-0.22 * age);
  const opacity = Math.min(1, (front.birthOpacity ?? 1) * fade * 1.12);
  const scaleX = getPulseScaleX(age);
  const scaleY = getPulseScaleY(age);
  const color = front.color;
  const strength = front.attenuation ?? attenuateEByDistance(0.5 * E_TARGET_TOTAL_WIDTH * age);
  if(!keepAttenuatedFront(front.renderIndex ?? front.sampleIndex ?? 0, strength)) return;

  // Seed on the RIGHT-UP lobe by intersecting the lobe with the diagonal of
  // its bounding rectangle whose lower-left corner is the rod center.
  const ptsRU = makeLobePoints(scaleX, scaleY, +1, -1);
  const anchorRU = findDiagonalAnchorData(ptsRU, scaleX, scaleY);
  const pRU = anchorRU.pos.clone();
  const tRU = anchorRU.tangent.clone().normalize();

  const reflectXPos = (p) => new THREE.Vector3( p.x, -p.y, p.z);
  const reflectYPos = (p) => new THREE.Vector3(-p.x,  p.y, p.z);
  const reflectXVec = (v) => new THREE.Vector3( v.x, -v.y, v.z);
  const reflectYVec = (v) => new THREE.Vector3(-v.x,  v.y, v.z);

  // Right-down: x-symmetry and reverse the direction.
  const pRD = reflectXPos(pRU);
  const tRD = reflectXVec(tRU).multiplyScalar(-1);
  // Left half: y-symmetry of the right half.
  const pLU = reflectYPos(pRU);
  const tLU = reflectYVec(tRU);
  const pLD = reflectYPos(pRD);
  const tLD = reflectYVec(tRD);

  const entries = [
    { pos: pRU, tangent: tRU },
    { pos: pRD, tangent: tRD },
    { pos: pLU, tangent: tLU },
    { pos: pLD, tangent: tLD },
  ];

  // Lock the semantic orientation explicitly:
  // red lobes point downward, blue lobes upward.
  // The seeded RU tangent already gives the downward family, so we keep it for red
  // and flip the full family for blue.
  const globalFlip = front.reverseArrows ? -1 : 1;
  const arrowOpacity = Math.min(opacity, visualOpacityFromStrength(strength));
  for(const ent of entries){
    const tangent = ent.tangent.clone().multiplyScalar(globalFlip);
    eArrowGroup.add(buildConeArrow(ent.pos, tangent, color, Math.max(0.09, 0.19 * strength), 0.011 * (0.55 + 0.45 * strength), arrowOpacity, 'xy'));
  }
}

  const fade = Math.exp(-0.22 * age);
  const opacity = Math.min(1, (front.birthOpacity ?? 1) * fade * 1.08);
  const color = front.color;
  const ccw = (color === COLORS.bNeg);
  const strength = front.attenuation ?? attenuateBByDistance(r);
  if(!keepAttenuatedFront(front.renderIndex ?? front.sampleIndex ?? 0, strength)) return;
  const thetas = [Math.PI * 0.5, Math.PI * 1.5];

function collectFieldSamplesE(fronts){

    const x = halfX * fr.age;
    const strength = fr.attenuation ?? attenuateEByDistance(x);
    const signedVal = -Math.sin(phaseEmit) * strength;
    return {
      t0: fr.t0,
      x,
      v: signedVal,
      color: signedVal >= 0 ? COLORS.ePos : COLORS.eNeg,
      show: (fr.birthOpacity ?? 1) > 0.5 && Math.abs(signedVal) > 0.012

  for(let k=0; k<totalPeriods; k++){
    for(const localEmit of E_FULL){
      const tEmit = k + localEmit;
      const age = u - tEmit;
      if(age < 0 || age > totalPeriods) continue;
      const x = halfX * age;
      if(x > maxX) continue;
      const phaseEmit = Math.PI + 2 * Math.PI * localEmit;
      const strength = attenuateEByDistance(x);
      const signedVal = -Math.sin(phaseEmit) * strength;
      const show = Math.abs(signedVal) > visibleCutoff;
      out.push({
        t0:tEmit,
        x,
        v: show ? signedVal : 0,
        color: signedVal >= 0 ? COLORS.ePos : COLORS.eNeg,
        show

    const signedVal = -Math.cos(phaseEmit) * strength;

function buildEFieldSequence(samples){

    const base = new THREE.Vector3(x, 0, arrowZ);

    tips.push(topTip);

    g.add(makeFieldArrow3D(base, tip, s.color, s.show, fieldArrowRadius()));
  }
  for(let i=0;i<samples.length-1;i++){
    const a = samples[i], b = samples[i+1];
    const p1 = tips[i], p2 = tips[i+1];
    const base1 = new THREE.Vector3(p1.x, 0, 0);
    const base2 = new THREE.Vector3(p2.x, 0, 0);
    g.add(makeFieldPlateE(base1, p1, p2, base2, fieldFillOpacity()));

    const topTip = new THREE.Vector3(x, FIELD_B_TOP_Y, z);
    const arrowY = FIELD_B_TOP_Y - fieldArrowInset();
    const base = new THREE.Vector3(x, arrowY, 0);
    const tip = new THREE.Vector3(x, arrowY, z);
    tips.push(topTip);
    targetGroup.add(makeFieldArrow3D(base, tip, s.color, s.show, fieldArrowRadius()));

function rebuildFieldVectorMode(u, eFronts, bFronts){
  disposeGroup(bFieldBackGroup);

  for(let k=0; k<totalPeriods; k++){

  }

  buildEFieldSequence(eSamples);

  for(let k=0; k<totalPeriods; k++){
    buildBFieldSequence(bFieldFrontGroup, collectBQuarterSamples(B_Q1, u, k, waveMaxX));
    buildBFieldSequence(bFieldFrontGroup, collectBQuarterSamples(B_Q4, u, k, waveMaxX));

    if(tau < 0){

      bSamples.push({ x, v:0, color:COLORS.bNeg, show:false });
      continue;
    }
    const coeff = transitionFieldCoefficients(x);
    const cosT = Math.cos(2 * Math.PI * tau);
    const sinT = Math.sin(2 * Math.PI * tau);
    const eVal = SOURCE_SIGNAL_AMPLITUDE * ((coeff.E.re * cosT - coeff.E.im * sinT) / maxE);
    const bVal = SOURCE_SIGNAL_AMPLITUDE * ((coeff.B.re * cosT - coeff.B.im * sinT) / maxB);
    eSamples.push({ x, v:eVal, color:eVal >= 0 ? COLORS.ePos : COLORS.eNeg, show:true });
    bSamples.push({ x, v:bVal, color:bVal >= 0 ? COLORS.bNeg : COLORS.bPos, show:true });
  }
  return { eSamples, bSamples };
}
function rebuildTransitionAutonomousFields(u){
  enterArrowAutonomousPipeline();
  ensureDirectFieldPools();
  hideFieldSequencePool(directFieldPools.bBack);
  const samples = collectTransitionFieldSamples(u);
  updateEFieldSequencePool(samples.eSamples, directFieldPools.e);
  updateBFieldSequencePool(samples.bSamples, directFieldPools.bFront);
}

function rebuildArrowAutonomousFields(u, includeB=true){

    rebuildTransitionAutonomousFields(u);
    return;
  }
  enterArrowAutonomousPipeline();
  ensureDirectFieldPools();
  const waveMaxX = activeWaveMaxX();
  const eSamples = collectFieldSamplesEDirect(u, waveMaxX);
  updateEFieldSequencePool(eSamples, directFieldPools.e);
  if(includeB){
    updateBFieldSequencePool(collectBDirectSideSamples(u, [B_Q2, B_Q3], waveMaxX), directFieldPools.bBack);
    updateBFieldSequencePool(collectBDirectSideSamples(u, [B_Q1, B_Q4], waveMaxX), directFieldPools.bFront);
  } else {
    hideFieldSequencePool(directFieldPools.bBack);
    hideFieldSequencePool(directFieldPools.bFront);

function rebuildFields(u){
  const needFieldMode = !!(ui.showFieldMode && ui.showFieldMode.checked);
  const showEFronts = !!(ui.showE && ui.showE.checked);
  const showBFronts = !!(ui.showB && ui.showB.checked);
  const arrowOnlyMode = appModes.main === 'arrows' || appModes.main === 'receiveArrows';

  if(arrowOnlyMode){
    hideDirectFrontPools();
    hideDirectCirclePools();
    if(needFieldMode) rebuildArrowAutonomousFields(u, true);
    else {
      enterArrowAutonomousPipeline();
      if(directFieldPools.inited){
        hideFieldSequencePool(directFieldPools.e);
        hideFieldSequencePool(directFieldPools.bBack);
        hideFieldSequencePool(directFieldPools.bFront);
      }
    }
    return;
  }

  enterLinePipeline();
  disposeGroup(eUpperGroup);
  disposeGroup(eArrowGroup);
  disposeGroup(eLowerGroup);
  disposeGroup(bBackGroup);
  disposeGroup(bArrowGroup);
  disposeGroup(bFrontGroup);
  disposeGroup(bFieldBackGroup);
  disposeGroup(eFieldGroup);
  disposeGroup(bFieldFrontGroup);

  const waveMaxX = activeWaveMaxX();
  const eFronts = showEFronts ? seededEFrontsAbsolute(u)
    .map((fr, sampleIndex) => {
      const x = 0.5 * E_TARGET_TOTAL_WIDTH * fr.age;
      const attenuation = attenuateEByDistance(x);
      return { ...fr, sampleIndex, xDistance:x, attenuation, birthOpacity: Math.min(fr.birthOpacity ?? 1, visualOpacityFromStrength(attenuation)), arrowLen: (fr.arrowLen || 0) * attenuation };
    })
    .filter(fr => fr.xDistance <= waveMaxX && fr.birthOpacity > 0.03)
    .map((fr, renderIndex) => ({ ...fr, renderIndex })) : [];
  const bFronts = showBFronts ? seededBFrontsAbsolute(u)
    .map((fr, sampleIndex) => {
      const x = B_RADIUS_FINAL * fr.age;
      const attenuation = attenuateBByDistance(x);
      return { ...fr, sampleIndex, xDistance:x, attenuation, birthOpacity: Math.min(fr.birthOpacity ?? 1, visualOpacityFromStrength(attenuation)), radius: x };
    })
    .filter(fr => fr.xDistance <= waveMaxX && fr.birthOpacity > 0.03)
    .map((fr, renderIndex) => ({ ...fr, renderIndex })) : [];

  if(showEFronts){
    updateDirectEFrontPools(eFronts);
    eFronts.forEach(fr => addEArrowCones(fr));
  } else {
    hideDirectFrontPools();
  }
  if(showBFronts){
    updateDirectBFrontPools(bFronts);
    bFronts.forEach(fr => addBArrowCones(fr));
  } else {
    hideDirectCirclePools();
  }
  if(needFieldMode){
    if(directFieldPools.inited){
      hideFieldSequencePool(directFieldPools.e);
      hideFieldSequencePool(directFieldPools.bBack);
      hideFieldSequencePool(directFieldPools.bFront);
    }
    rebuildFieldVectorMode(u, eFronts, bFronts);
  } else if(directFieldPools.inited){
    hideFieldSequencePool(directFieldPools.e);
    hideFieldSequencePool(directFieldPools.bBack);
    hideFieldSequencePool(directFieldPools.bFront);
  }
}



function chargeAndCurrent(u){
  const phase = 2 * Math.PI * phaseWrapped(u);
  return { chargeSigned: SOURCE_SIGNAL_AMPLITUDE * Math.sin(phase), currentSigned: -SOURCE_SIGNAL_AMPLITUDE * Math.cos(phase) };
}
const RECEIVER_BASE_Y = 0; // αρχική θέση ηλεκτρονίου στο μηδέν
const RECEIVER_DYNAMIC_AMP = 0.72 * ROD_HALF_LENGTH;

// Τοπικό σήμα του Ε στη θέση του δέκτη.
// Στο πρώτο Τ/2 θέλουμε το Ε να έχει ίδιο χρώμα/σήμα και η δύναμη στο ηλεκτρόνιο
// (αρνητικό φορτίο) να είναι αντίθετη: προς τα κάτω όσο το Ε "δείχνει" προς τα πάνω.
function receiverFieldState(localU, emitPeriods){
  const wavePresent = localU > 0 && localU <= emitPeriods;
  if(!wavePresent){
    return { wavePresent:false, envelope:0, eSigned:0, forceSigned:0 };
  }
  const phase = 2 * Math.PI * localU;
  const eSigned = SOURCE_SIGNAL_AMPLITUDE * Math.sin(phase);
  const forceSigned = -eSigned;
  return { wavePresent:true, envelope:Math.abs(eSigned), eSigned, forceSigned };
}

// Μεταβατική εξαναγκασμένη κίνηση με απόσβεση:
// y'' + c y' + k y = G * F(t)
// όπου F(t) μηδενίζεται όταν περάσει το pulse train, αλλά η κίνηση συνεχίζει λόγω αδράνειας.
const receiverSim = { initialized:false, paramsKey:'', lastU:0, y:0, v:0, a:0 };
function receiverParamsKey(){
  return `${getEmitPeriods()}|${+(ui.receiverX?.value || 2)}|${RECEIVER_NAT_RATIO}`;
}
function resetReceiverSim(){
  receiverSim.initialized = false;
  receiverSim.paramsKey = receiverParamsKey();
  receiverSim.lastU = 0;
  receiverSim.y = 0;
  receiverSim.v = 0;
  receiverSim.a = 0;
}

function receiverDriveState(u){
  if(!isReceiveMode()){
    return { wavePresent:false, eSigned:0, forceSigned:0, disp:0, speed:0, envelope:0, accel:0 };
  }
  const receiverX = Math.max(0.5, Math.min(9.5, +(ui.receiverX?.value || 2)));
  const emitPeriods = getEmitPeriods();
  const localU = u - receiverX / RECEIVER_WAVE_SPEED_X;
  const DRIVE_GAIN = 22.0;
  const DRIVE_OMEGA = 2 * Math.PI;
  const NAT_RATIO = RECEIVER_NAT_RATIO;
  const NATURAL_OMEGA = DRIVE_OMEGA * NAT_RATIO;
  const RESTORE_K = NATURAL_OMEGA * NATURAL_OMEGA;
  const DAMP_RATIO = 0.14;
  const DAMP_C = 2 * DAMP_RATIO * NATURAL_OMEGA;
  const paramsKey = receiverParamsKey();
  const targetU = Math.max(0, u);

  if(!receiverSim.initialized || receiverSim.paramsKey !== paramsKey || targetU < receiverSim.lastU - 1e-9){
    resetReceiverSim();
  }
  receiverSim.initialized = true;

  const deltaU = targetU - receiverSim.lastU;
  if(deltaU > 0){
    const steps = Math.max(1, Math.ceil(deltaU * 240));
    const du = deltaU / steps;
    let absSampleU = receiverSim.lastU;
    for(let i=0;i<steps;i++){
      absSampleU += du;
      const sampleLocalU = absSampleU - receiverX / RECEIVER_WAVE_SPEED_X;
      const s = receiverFieldState(sampleLocalU, emitPeriods);
      receiverSim.a = DRIVE_GAIN * s.forceSigned - RESTORE_K * receiverSim.y - DAMP_C * receiverSim.v;
      receiverSim.v += receiverSim.a * du;
      receiverSim.y += receiverSim.v * du;
    }
    receiverSim.lastU = targetU;
  }

  const now = receiverFieldState(localU, emitPeriods);
  const moving = Math.abs(receiverSim.y) > 1e-4 || Math.abs(receiverSim.v) > 1e-4;
  const active = now.wavePresent || moving;
  const envelope = Math.max(now.envelope, Math.min(1, 0.18 * Math.abs(receiverSim.y) + 0.10 * Math.abs(receiverSim.v)));
  return {
    active,
    localU,
    wavePresent:now.wavePresent,
    envelope,
    disp:receiverSim.y,
    speed:receiverSim.v,
    eSigned:now.eSigned,
    forceSigned:now.forceSigned,
    accel:receiverSim.a
  };
}


function updateReceiverArrows(receiverState, electronY){
  const shown = ui.showParticles.checked;
  const velMag = Math.tanh(Math.abs(receiverState.speed || 0) / 3.0);
  const velDir = (receiverState.speed || 0) >= 0 ? 1 : -1;
  const velColor = COLORS.receiverVel;
  const velLen = 0.10 + 0.34 * velMag;
  const velVisible = shown && velMag > 0.02;
  const velX = 0.0;
  const velZ = 0.17;
  const clearance = 0.11;
  const velAnchorY = electronY + clearance;
  setReceiverArrowState(receiverVelocityArrow, {
    visible: velVisible,
    direction: velDir,
    length: velLen,
    anchorY: velAnchorY,
    x: velX,
    z: velZ,
    color: velColor,
    opacity: 0.30 + 0.70 * velMag
  });
}

function electronCenters(chargeSigned, currentSigned){
  const N = ELECTRON_COUNT;
  const r = 0.052;
  const d = 2 * r;
  const lower = -0.68;
  const upper =  0.68;
  const a = 0.020;
  // exact baseline arithmetic-progression pattern:
  // 0, a+d, 3a+2d, 6a+3d, 10a+4d, 15a+5d, 21a+6d
  const tri = [0, 1, 3, 6, 10, 15, 21];
  const targetOffsets = tri.map((t, i) => t * a + i * d);

  const span = upper - lower;
  const uniformGap = span / (N - 1);
  const base = Array.from({length:N}, (_,i) => lower + i * uniformGap);

  const q = Math.abs(chargeSigned);
  // Με τη σύμβασή μας q>0 σημαίνει θετικό κάτω άκρο,
  // άρα τα ηλεκτρόνια έχουν κινηθεί προς τα ΠΑΝΩ.
  const moveUp = chargeSigned > 0;
  const ys = new Array(N);
  if(moveUp){
    for(let i=0;i<N;i++){
      const target = upper - targetOffsets[N - 1 - i];
      ys[i] = base[i] + q * (target - base[i]);
    }
  } else {
    for(let i=0;i<N;i++){
      const target = lower + targetOffsets[i];
      ys[i] = base[i] + q * (target - base[i]);
    }
  }
  const minY = lower + r;
  const maxY = upper - r;
  return ys.map(v => Math.min(maxY, Math.max(minY, v)) * (ROD_LENGTH / 1.6));
}
function updateParticles(u){
  const { chargeSigned, currentSigned } = chargeAndCurrent(u);
  const showParticles = !!(ui.showParticles && ui.showParticles.checked);
  const showCurrent = !isReceiveMode();
  const receiverActive = isReceiveMode() && showParticles;

  if(showParticles){
    const ys = electronCenters(chargeSigned, currentSigned);
    const receiverState = receiverActive ? receiverDriveState(u) : null;
    electrons.forEach((e, idx) => {
      e.position.set(0, ys[idx], 0);
      const pulse = 0.82 + 0.28 * Math.abs(currentSigned);
      e.material.opacity = 0.90 + 0.08 * Math.abs(currentSigned);
      e.material.emissiveIntensity = 0.90 + 0.45 * Math.abs(currentSigned);
      if(e.children[0]) e.children[0].material.opacity = 0.72 + 0.26 * Math.abs(currentSigned);
      if(e.children[0]) e.children[0].scale.setScalar(0.16 * pulse + 0.04);
      if(e.children[1]) e.children[1].material.opacity = 0.18 + 0.12 * Math.abs(currentSigned);
    });
    if(receiverActive && receiverState){
      const receiverDispClamped = THREE.MathUtils.clamp(receiverState.disp, -2.2, 2.2);
      const receiverY = RECEIVER_BASE_Y + RECEIVER_DYNAMIC_AMP * receiverDispClamped;
      receiverElectron.position.set(0, receiverY, 0);
      const receiverPulse = 0.92 + 0.26 * Math.abs(receiverState.speed);
      receiverElectron.material.opacity = 0.88 + 0.10 * receiverState.envelope;
      receiverElectron.material.emissiveIntensity = 0.92 + 0.56 * Math.abs(receiverState.speed);
      if(receiverElectron.children[0]) receiverElectron.children[0].material.opacity = 0.40 + 0.46 * receiverState.envelope;
      if(receiverElectron.children[0]) receiverElectron.children[0].scale.setScalar(0.16 * receiverPulse + 0.03);
      if(receiverElectron.children[1]) receiverElectron.children[1].material.opacity = 0.10 + 0.18 * receiverState.envelope;
      updateReceiverArrows(receiverState, receiverY);
    } else {
      receiverVelocityArrow.visible = false;
    }

    const qmag = Math.abs(chargeSigned);
    // Προσοχή: στο συγκεκριμένο scene graph τα αντικείμενα με όνομα top*
    // βρίσκονται οπτικά στο ΚΑΤΩ άκρο (y<0), ενώ τα bot* στο ΠΑΝΩ (y>0).
    // Με τη σύμβαση q>0: κάτω άκρο θετικό, πάνω άκρο αρνητικό.
    const lowerHex = chargeSigned > 0 ? COLORS.chargePos : COLORS.chargeNeg;
    const upperHex = chargeSigned > 0 ? COLORS.chargeNeg : COLORS.chargePos;
    topGlow.material.color.setHex(lowerHex);
    botGlow.material.color.setHex(upperHex);
    const glowOpacity = 0.84 * Math.pow(qmag, 1.18);
    const glowScale = 0.24 + 1.02 * qmag;
    topGlow.material.opacity = glowOpacity;
    botGlow.material.opacity = glowOpacity;
    topGlow.scale.setScalar(glowScale);
    botGlow.scale.setScalar(glowScale);
    updateChargeTextSprite(topChargeSign, chargeSigned > 0 ? '+' : '−', lowerHex, qmag);
    updateChargeTextSprite(botChargeSign, chargeSigned > 0 ? '−' : '+', upperHex, qmag);
  } else {
    receiverVelocityArrow.visible = false;
  }

  if(showCurrent){
    const arrowColor = currentSigned >= 0 ? COLORS.bPos : COLORS.bNeg;
    currentGroup.rotation.z = currentSigned >= 0 ? 0 : Math.PI;
    const imag = Math.abs(currentSigned);
    const shaftRadiusScale = 0.90 + 1.70 * imag;
    const shaftLengthScale = 0.62 + 0.10 * imag;
    const dynOpacity = 0.20 + 0.76 * imag;
    currentShaft.scale.set(shaftRadiusScale, shaftLengthScale, shaftRadiusScale);
    currentHead.scale.set(0.84 + 1.05 * imag, 0.84 + 0.08 * imag, 0.84 + 1.05 * imag);
    currentHead.position.y = 0.14 + 0.095 * shaftLengthScale;
    currentShaft.material.color.setHex(arrowColor); currentShaft.material.emissive.setHex(arrowColor);
    currentHead.material.color.setHex(arrowColor); currentHead.material.emissive.setHex(arrowColor);
    currentShaft.material.opacity = dynOpacity; currentShaft.material.transparent = true; currentShaft.material.depthWrite = false;
    currentHead.material.opacity = dynOpacity; currentHead.material.transparent = true; currentHead.material.depthWrite = false;
    currentLabel.material.opacity = Math.min(1, 0.55 + 0.45 * imag);
    rod.material.opacity = 0.20 + 0.12 * imag;
    rodInnerGlow.material.opacity = 0.06 + 0.22 * imag;
    rodInnerGlow.material.color.setHex(arrowColor);
  }
}
function drawSingleGraph(canvas, row, opts={}){
  const box = canvas.parentElement.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(180, Math.round(box.width));
  const h = Math.max(opts.minH || 62, Math.round(box.height));
  const pxW = Math.max(180, Math.round(w * dpr));
  const pxH = Math.max(opts.minH || 62, Math.round(h * dpr));
  if(canvas.width !== pxW || canvas.height !== pxH){
    canvas.width = pxW; canvas.height = pxH;
  }
  const g = canvas.getContext('2d');
  g.setTransform(dpr,0,0,dpr,0,0);
  const th = VIEW_THEMES[activeViewTheme] || VIEW_THEMES.screen;
  g.clearRect(0,0,w,h);
  g.fillStyle = 'rgba(0,0,0,0)';
  g.fillRect(0,0,w,h);
  const axisX = 28;
  const right = 8;
  const top = 6;
  const bottom = opts.showTicks === false ? 6 : 16;
  const gw = Math.max(80, w - axisX - right);
  const midY = Math.round((top + (h - bottom)) * 0.5);
  const ampPix = Math.max(10, ((h - top - bottom) * 0.36) / Math.max(1e-9, GRAPH_SIGNAL_MAX));
  const graphStateNow = getGraphPhaseState();
  const pw = graphStateNow.local;
  function signColor(family, value){
    if(family === 'E') return value >= 0 ? th.ePos : th.eNeg;
    return value >= 0 ? th.bNeg : th.bPos;
  }
  // background guides
  g.strokeStyle = th.graphGrid;
  g.lineWidth = 1;
  [0.25,0.5,0.75].forEach(fr => { const x = axisX + gw * fr; g.beginPath(); g.moveTo(x, top); g.lineTo(x, h-bottom); g.stroke(); });
  g.strokeStyle = th.graphYAxis;
  g.beginPath(); g.moveTo(axisX, top); g.lineTo(axisX, h-bottom); g.stroke();
  g.strokeStyle = th.graphXAxis;
  g.lineWidth = 1.3;
  g.beginPath(); g.moveTo(axisX, midY); g.lineTo(axisX + gw, midY); g.stroke();
  g.fillStyle = th.graphText;
  g.font = '11px system-ui';
  g.textAlign = 'left';
  g.textBaseline = 'top';
  g.fillText(row.label, 8, 6);
  let started = false, prevSign = null;
  for(let i=0;i<=220;i++){
    const uu = i/220;
    const val = row.fn(uu);
    const x = axisX + gw * uu;
    const y = midY - val * ampPix;
    const sign = val >= 0 ? 1 : -1;
    if(!started){
      g.beginPath();
      g.strokeStyle = signColor(row.family, val);
      g.lineWidth = 2.05;
      g.moveTo(x,y); started = true;
    } else if(sign !== prevSign){
      g.lineTo(x,y); g.stroke();
      g.beginPath(); g.strokeStyle = signColor(row.family, val); g.lineWidth = 2.05; g.moveTo(x,y);
    }
    g.lineTo(x,y); prevSign = sign;
  }
  if(started) g.stroke();
  if(opts.showTicks !== false){
    g.strokeStyle = th.graphYAxis;
    g.lineWidth = 0.9;
    g.fillStyle = th.graphTick;
    g.font = '9px system-ui';
    g.textAlign = 'center';
    graphTickLabels().forEach(([lab,uu]) => {
      const x = axisX + gw * uu;
      g.beginPath(); g.moveTo(x, midY-2.5); g.lineTo(x, midY+2.5); g.stroke();
      g.textBaseline = 'top'; g.fillText(lab, x, midY + 4);
    });
  }
  const valNow = row.fn(pw);
  const xNow = axisX + gw * pw;
  const yNow = midY - valNow * ampPix;
  g.fillStyle = signColor(row.family, valNow);
  g.beginPath(); g.arc(xNow, yNow, 3.0, 0, Math.PI*2); g.fill();
  if(row.tangent){
    const deriv = SOURCE_SIGNAL_AMPLITUDE * 2 * Math.PI * Math.cos(2 * Math.PI * pw);
    const iNow = sourceCos01(pw);
    const m = -(ampPix * deriv) / gw;
    const dx = 36 / Math.sqrt(1 + m*m);
    const dy = m * dx;
    g.strokeStyle = iNow >= 0 ? '#f2a31b' : '#38b66b';
    g.lineWidth = 1.6;
    g.beginPath(); g.moveTo(xNow - dx, yNow - dy); g.lineTo(xNow + dx, yNow + dy); g.stroke();
  }
  if(opts.showCursor){
    g.strokeStyle = th.graphCursor;
    g.lineWidth = 0.9;
    g.setLineDash([2,4]);
    g.beginPath(); g.moveTo(xNow, top); g.lineTo(xNow, h-bottom); g.stroke();
    g.setLineDash([]);
  }
}
function drawGraphs(force=false){
  if(!force && !graphState.dynamicDirty) return;
  const rows = {
    V:{ label:'V', fn:u => sourceSin01(u), family:'E', tangent:false },
    Q:{ label:'q', fn:u => sourceSin01(u), family:'E', tangent:true },
    I:{ label:'i', fn:u => sourceCos01(u), family:'B', tangent:false },
    E:{ label:'E', fn:u => sourceSin01(u), family:'E', tangent:false },
    B:{ label:'B', fn:u => sourceCos01(u), family:'B', tangent:false },
  };
  drawSingleGraph(graphPapers.V, rows.V, { minH:56, showTicks:true, showCursor:true });
  drawSingleGraph(graphPapers.Q, rows.Q, { minH:56, showTicks:true, showCursor:true });
  drawSingleGraph(graphPapers.I, rows.I, { minH:56, showTicks:true, showCursor:true });
  drawSingleGraph(graphPapers.E, rows.E, { minH:72, showTicks:true, showCursor:true });
  drawSingleGraph(graphPapers.B, rows.B, { minH:72, showTicks:true, showCursor:true });
  graphState.dynamicDirty = false;
  graphState.staticDirty = false;
}

function applyUI(){
  const eOpacity = (+ui.eAlpha.value) / 100;
  const bOpacity = (+ui.bAlpha.value) / 100;
  ePlaneUpper.material.opacity = eOpacity;
  ePlaneLower.material.opacity = eOpacity;

  if(appModes.main !== 'lines') return;
  if(!ui.showE.checked && !ui.showB.checked) ui.showB.checked = true;
  restartEvolutionForSelection();
});
ui.showB?.addEventListener('input', () => {
  if(appModes.main !== 'lines') return;
  if(!ui.showE.checked && !ui.showB.checked) ui.showE.checked = true;
  restartEvolutionForSelection();
});

let last = performance.now();
var lastPhaseBucket = -1;
async function initializeApp(){
  await loadExternalPresetData();
  applyMainMode('rod', true);
  setRegionMode('near', { applyDefaults:false });
  invalidateGraphs(true);
  applyViewPreset(VIEW_SCREEN);
  updateReceiverPlacement();
  updatePlanes(0);
  rebuildFields(0);
  applyFocusPreset('default');
  updatePlayButtons();
  applyUrlState();
}
function animate(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  const totalPeriods = getBookSceneEndPhase();
  if(playing){
    const nextU = phaseU + dt * ((+ui.speed.value) / 100);
    phaseU = Math.min(totalPeriods, nextU);
    if(nextU >= totalPeriods - 1e-9){
      phaseU = totalPeriods;
      playing = false;
      updatePlayButtons();
    }
  }
  const needWaveVisuals = !!((ui.showE && ui.showE.checked) || (ui.showB && ui.showB.checked) || (ui.showFieldMode && ui.showFieldMode.checked));
  if(needWaveVisuals){
    const bucket = Math.floor(phaseU * 240);
    if(bucket !== lastPhaseBucket){
      rebuildFields(phaseU);
      lastPhaseBucket = bucket;
    }
  }
  if(planes.visible){
    updatePlanes(phaseU);
  }
  if(ui.showParticles.checked || (ui.showCurrent.checked && !isReceiveMode())){
    updateParticles(phaseU);
  }
  const graphBucket = Math.floor(phaseWrapped(phaseU) * 180);
  if(graphBucket !== graphState.phaseBucket){
    graphState.phaseBucket = graphBucket;
    invalidateGraphs(false);
  }
  drawGraphs();
  maybeAutoFit();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
initializeApp().then(() => { requestAnimationFrame(animate); });
</script>
