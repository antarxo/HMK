<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EMW v2 Projection Skeleton v3</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111822;
      --axis:#6f7f95;
      --text:#e8eef7;
      --muted:#9aa8bc;
      --e1:#e85a5a;
      --e2:#4fa8d8;
      --b1:#38b66b;
      --b2:#f2a31b;
      --rod:#d8dee7;
      --accent:#b7c6db;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:14px/1.35 system-ui,Segoe UI,Arial,sans-serif}
    .app{display:grid;grid-template-rows:auto 1fr auto;min-height:100%}
    .top{
      padding:12px 16px;
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),var(--panel);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .title{font-size:18px;font-weight:700}
    .sub{color:var(--muted);margin-top:4px}
    .main{display:grid;grid-template-columns:320px 1fr;gap:14px;padding:14px}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),var(--panel);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      overflow:hidden;
    }
    .card h3{margin:0;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px}
    .card .body{padding:12px}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin:10px 0}
    .row label{color:var(--muted)}
    input[type="range"]{width:170px}
    .viewport{position:relative;min-height:74vh}
    canvas{display:block;width:100%;height:100%}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:7px 10px;
      border-radius:10px;
      cursor:pointer;
    }
    button:hover{background:rgba(255,255,255,.1)}
    .legend{display:grid;gap:8px;margin-top:10px}
    .sw{display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:8px;vertical-align:-2px}
    .foot{padding:10px 16px;color:var(--muted);border-top:1px solid rgba(255,255,255,.08)}
    code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">EMW v2 – Projection Skeleton v3</div>
    <div class="sub">Δυναμικός σκελετός 2.5D με fronts του E στο x–y και του B στο x–z.</div>
  </div>

  <div class="main">
    <div class="card">
      <h3>Κάμερα / σκηνή</h3>
      <div class="body">
        <div class="row"><label>Yaw κάμερας</label><input id="yaw" type="range" min="-60" max="60" value="-28"></div>
        <div class="row"><label>Pitch κάμερας</label><input id="pitch" type="range" min="-45" max="45" value="18"></div>
        <div class="row"><label>Focal</label><input id="focal" type="range" min="300" max="1400" value="720"></div>
        <div class="row"><label>Scale σκηνής</label><input id="scale" type="range" min="40" max="220" value="118"></div>
        <div class="row"><label>Ταχύτητα διάδοσης</label><input id="speed" type="range" min="20" max="180" value="82"></div>
        <div class="row"><label>Πλήθος fronts</label><input id="count" type="range" min="2" max="10" value="5"></div>
        <div class="row"><label>Show axes</label><input id="axes" type="checkbox" checked></div>
        <div class="row"><label>Show E fronts</label><input id="showE" type="checkbox" checked></div>
        <div class="row"><label>Show B fronts</label><input id="showB" type="checkbox" checked></div>
        <div class="row"><label>Show rod</label><input id="showRod" type="checkbox" checked></div>

        <div class="controls">
          <button id="playBtn">Παύση</button>
          <button id="resetBtn">Επαναφορά</button>
        </div>

        <div class="legend">
          <div><span class="sw" style="background:#e85a5a"></span>E front (+)</div>
          <div><span class="sw" style="background:#4fa8d8"></span>E front (−)</div>
          <div><span class="sw" style="background:#38b66b"></span>B front (+)</div>
          <div><span class="sw" style="background:#f2a31b"></span>B front (−)</div>
        </div>
      </div>
    </div>

    <div class="card viewport">
      <canvas id="cv" width="1400" height="900"></canvas>
    </div>
  </div>

  <div class="foot">
    Σειρά λογικής: <code>3D scene → projection → render passes</code>.  
    Εδώ δοκιμάζουμε τη νέα γεωμετρία σε κίνηση, όχι ακόμη το πλήρες visual system.
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

const ui = {
  yaw: document.getElementById('yaw'),
  pitch: document.getElementById('pitch'),
  focal: document.getElementById('focal'),
  scale: document.getElementById('scale'),
  speed: document.getElementById('speed'),
  count: document.getElementById('count'),
  axes: document.getElementById('axes'),
  showE: document.getElementById('showE'),
  showB: document.getElementById('showB'),
  showRod: document.getElementById('showRod'),
  playBtn: document.getElementById('playBtn'),
  resetBtn: document.getElementById('resetBtn')
};

function resizeCanvas(){
  const r = cv.getBoundingClientRect();
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  cv.width = Math.round(r.width * dpr);
  cv.height = Math.round(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 0);

const COLORS = {
  bg: '#0b0f14',
  axis: '#6f7f95',
  rod: '#d8dee7',
  ePos: '#e85a5a',
  eNeg: '#4fa8d8',
  bPos: '#38b66b',
  bNeg: '#f2a31b'
};

const state = {
  t: 0,
  playing: true
};

ui.playBtn.addEventListener('click', () => {
  state.playing = !state.playing;
  ui.playBtn.textContent = state.playing ? 'Παύση' : 'Έναρξη';
});
ui.resetBtn.addEventListener('click', () => { state.t = 0; });

function deg(a){ return a*Math.PI/180; }

function rotateY(p, a){
  const c = Math.cos(a), s = Math.sin(a);
  return {x: c*p.x + s*p.z, y: p.y, z: -s*p.x + c*p.z};
}
function rotateX(p, a){
  const c = Math.cos(a), s = Math.sin(a);
  return {x: p.x, y: c*p.y - s*p.z, z: s*p.y + c*p.z};
}
function transformPoint(p, cam){
  let q = rotateY(p, cam.yaw);
  q = rotateX(q, cam.pitch);
  return q;
}
function project(p, cam, vp){
  const q = transformPoint(p, cam);
  const z = q.z + cam.distance;
  const k = cam.focal / Math.max(40, z);
  return {
    x: vp.cx + q.x * cam.scale * k,
    y: vp.cy - q.y * cam.scale * k,
    depth: z
  };
}

function pathProjected(points, cam, vp){
  return points.map(p => project(p, cam, vp));
}

function drawPolyline(pts2, color, width=2, alpha=1){
  if(pts2.length < 2) return;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.globalAlpha = alpha;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(pts2[0].x, pts2[0].y);
  for(let i=1;i<pts2.length;i++) ctx.lineTo(pts2[i].x, pts2[i].y);
  ctx.stroke();
  ctx.restore();
}

function drawAxes(cam, vp){
  const axes = [
    {a:{x:-1.1,y:0,z:0}, b:{x:2.5,y:0,z:0}, c:'#8ca0b8', label:'x'},
    {a:{x:0,y:-1.1,z:0}, b:{x:0,y:1.1,z:0}, c:COLORS.ePos, label:'y'},
    {a:{x:0,y:0,z:-1.1}, b:{x:0,y:0,z:1.1}, c:COLORS.bPos, label:'z'}
  ];
  ctx.save();
  ctx.font = '12px system-ui';
  axes.forEach(ax => {
    const A = project(ax.a, cam, vp), B = project(ax.b, cam, vp);
    ctx.strokeStyle = ax.c;
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(A.x,A.y);
    ctx.lineTo(B.x,B.y);
    ctx.stroke();
    ctx.fillStyle = ax.c;
    ctx.fillText(ax.label, B.x+6, B.y-4);
  });
  ctx.restore();
}

function drawRod(cam, vp){
  const p1 = project({x:0,y:-0.78,z:0}, cam, vp);
  const p2 = project({x:0,y: 0.78,z:0}, cam, vp);
  ctx.save();
  ctx.strokeStyle = COLORS.rod;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(p1.x,p1.y);
  ctx.lineTo(p2.x,p2.y);
  ctx.stroke();
  ctx.restore();
}

function makeEFront(x0, amp=0.62, len=0.48, sign=1, n=80){
  const pts = [];
  for(let i=0;i<n;i++){
    const t = i/(n-1);
    pts.push({
      x: x0 + (t-0.5)*len,
      y: sign * amp * Math.sin(Math.PI*t),
      z: 0
    });
  }
  return pts;
}

function makeBFront(x0, bx=0.22, bz=0.34, sign=1, n=96){
  const pts = [];
  for(let i=0;i<n;i++){
    const t = (i/(n-1))*Math.PI*2;
    pts.push({
      x: x0 + bx*Math.cos(t),
      y: 0,
      z: sign * bz*Math.sin(t)
    });
  }
  return pts;
}

function getFronts(){
  const count = +ui.count.value;
  const step = 0.34;
  const lead = state.t * (+ui.speed.value/100);
  const e = [];
  const b = [];
  for(let i=0;i<count;i++){
    const x = 0.25 + lead - i*step;
    if(x < -0.6 || x > 2.3) continue;
    e.push({x, sign:(i%2===0?1:-1), color:(i%2===0?COLORS.ePos:COLORS.eNeg)});
    b.push({x, sign:(i%2===0?1:-1), color:(i%2===0?COLORS.bPos:COLORS.bNeg)});
  }
  return {e,b};
}

let lastTs = performance.now();
function render(ts){
  const dt = Math.min(0.04, (ts - lastTs)/1000);
  lastTs = ts;
  if(state.playing) state.t += dt;

  const w = cv.clientWidth, h = cv.clientHeight;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0,0,w,h);

  const cam = {
    yaw: deg(+ui.yaw.value),
    pitch: deg(+ui.pitch.value),
    focal: +ui.focal.value,
    scale: +ui.scale.value/100,
    distance: 4.4
  };
  const vp = {cx:w*0.56, cy:h*0.54};

  const back = [];
  const mid = [];
  const front = [];

  if(ui.axes.checked) mid.push(() => drawAxes(cam, vp));
  if(ui.showRod.checked) mid.push(() => drawRod(cam, vp));

  const fronts = getFronts();

  if(ui.showE.checked){
    fronts.e.forEach((fr, i) => {
      const pts = pathProjected(makeEFront(fr.x, 0.62, 0.48, fr.sign), cam, vp);
      back.push(() => drawPolyline(pts, fr.color, 2.2, 0.84 - i*0.08));
    });
  }

  if(ui.showB.checked){
    fronts.b.forEach((fr, i) => {
      const pts = pathProjected(makeBFront(fr.x, 0.22, 0.34, fr.sign), cam, vp);
      front.push(() => drawPolyline(pts, fr.color, 2.3, 0.88 - i*0.08));
    });
  }

  [...back, ...mid, ...front].forEach(fn => fn());
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
