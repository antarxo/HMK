<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Electron gap sanity check</title>
  <style>
    :root{
      --bg:#0b0f14; --panel:#111822; --text:#e8eef7; --muted:#9aa8bc;
      --rod:#d8dee7; --electron:#7ee8ff; --neg:#e85a5a; --pos:#4fa8d8;
      --curPos:#38b66b; --curNeg:#f2a31b;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:14px/1.35 system-ui,Segoe UI,Arial,sans-serif}
    .app{display:grid;grid-template-rows:auto 1fr auto;height:100dvh}
    .top,.foot{padding:10px 14px;background:var(--panel);border-bottom:1px solid rgba(255,255,255,.08)}
    .foot{border-bottom:0;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:var(--muted)}
    .main{display:grid;grid-template-columns:minmax(260px,320px) 1fr;gap:12px;padding:12px;min-height:0}
    .card{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;min-height:0}
    .card h3{margin:0;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px}
    .body{padding:10px 12px}
    .row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin:8px 0}
    .row label{font-size:12px;color:var(--muted)}
    input[type="range"]{width:150px}
    button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);padding:6px 10px;border-radius:10px;cursor:pointer;font-size:12px}
    .controls{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .viewport{position:relative;min-height:0}
    canvas{display:block;width:100%;height:100%}
    .small{font-size:12px;color:var(--muted)}
    .readout{font:12px ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap;color:#d7e2f2;background:rgba(255,255,255,.04);padding:8px;border-radius:10px;margin-top:8px}
    @media (max-width: 900px){
      .main{grid-template-columns:1fr}
      .viewport{min-height:56vh}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div><strong>Sanity check: surface gaps a, 2a, 3a, 4a, 5a, 6a</strong></div>
    <div class="small">Απομονωμένο τεστ μόνο για τη ράβδο, τα ηλεκτρόνια, τα κενά και το ρεύμα.</div>
  </div>

  <div class="main">
    <div class="card">
      <h3>Ρυθμίσεις</h3>
      <div class="body">
        <div class="row"><label>Playback speed</label><input id="speed" type="range" min="3" max="120" value="28"></div>
        <div class="row"><label>Shift ράβδου στο x</label><input id="rodX" type="range" min="-220" max="220" value="0"></div>
        <div class="row"><label>Scale</label><input id="scale" type="range" min="80" max="220" value="140"></div>
        <div class="controls">
          <button id="playBtn">Παύση</button>
          <button id="resetBtn">Επαναφορά</button>
        </div>
        <div class="readout" id="readout"></div>
      </div>
    </div>

    <div class="card viewport">
      <canvas id="cv" width="1200" height="900"></canvas>
    </div>
  </div>

  <div class="foot">
    Εδώ τα κενά μετρώνται ως <strong>επιφάνεια προς επιφάνεια</strong>, όχι από κέντρο σε κέντρο.
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const readout = document.getElementById('readout');
const ui = {
  speed: document.getElementById('speed'),
  rodX: document.getElementById('rodX'),
  scale: document.getElementById('scale'),
  playBtn: document.getElementById('playBtn'),
  resetBtn: document.getElementById('resetBtn')
};

const COLORS = {
  bg:'#0b0f14', rod:'#d8dee7', electron:'#7ee8ff',
  neg:'#e85a5a', pos:'#4fa8d8', curPos:'#38b66b', curNeg:'#f2a31b'
};

const state = { t:0, playing:true };

ui.playBtn.addEventListener('click', () => {
  state.playing = !state.playing;
  ui.playBtn.textContent = state.playing ? 'Παύση' : 'Έναρξη';
});
ui.resetBtn.addEventListener('click', () => { state.t = 0; });

function resizeCanvas(){
  const r = cv.getBoundingClientRect();
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  cv.width = Math.round(r.width * dpr);
  cv.height = Math.round(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 0);

function drawArrow(baseX, baseY, tipX, tipY, color, width=2.5, alpha=1){
  const dx = tipX-baseX, dy = tipY-baseY;
  const L = Math.hypot(dx,dy);
  if(L < 1e-6) return;
  const ux = dx/L, uy = dy/L;
  const head = Math.min(16, Math.max(9, L*0.18));
  const half = head * 0.42;
  const sx = tipX - ux*head, sy = tipY - uy*head;
  const px = -uy, py = ux;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(baseX, baseY);
  ctx.lineTo(sx, sy);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(sx + px*half, sy + py*half);
  ctx.lineTo(sx - px*half, sy - py*half);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function chargeAndCurrent(t){
  const phase = 2*Math.PI*t;
  // αρχικά ηλεκτρόνια προς τα πάνω -> ρεύμα προς τα κάτω
  const chargeSigned = -Math.sin(phase);
  const currentSigned = -Math.cos(phase);
  return { phase, chargeSigned, currentSigned };
}

function electronCenters(chargeSigned){
  const N = 7;
  const r = 0.045;              // radius in rod-local units
  const d = 2 * r;              // diameter
  const top = -0.68;
  const bot =  0.68;

  // small a, as requested
  const a = 0.020;

  // target center positions relative to anchored first center:
  // 0
  // a + d
  // 3a + 2d
  // 6a + 3d
  // 10a + 4d
  // 15a + 5d
  // 21a + 6d
  const tri = [0, 1, 3, 6, 10, 15, 21];
  const targetOffsets = tri.map((t, i) => t * a + i * d);

  // initial uniform centers
  const span = bot - top;
  const uniformGap = span / (N - 1);
  const base = Array.from({length:N}, (_,i) => top + i * uniformGap);

  const q = Math.abs(chargeSigned);
  const moveUp = chargeSigned < 0;   // initial motion upward

  const ys = new Array(N);

  if(moveUp){
    // top center anchored
    for(let i=0;i<N;i++){
      const target = top + targetOffsets[i];
      ys[i] = base[i] + q * (target - base[i]);
    }
  } else {
    // bottom center anchored
    for(let i=0;i<N;i++){
      const target = bot - targetOffsets[N - 1 - i];
      ys[i] = base[i] + q * (target - base[i]);
    }
  }

  const centerGaps = [];
  const surfaceGaps = [];
  for(let i=0;i<N-1;i++){
    centerGaps.push(ys[i+1] - ys[i]);
    surfaceGaps.push((ys[i+1] - ys[i]) - d);
  }

  return { ys, r, d, a, centerGaps, surfaceGaps, moveUp };
}

let lastTs = performance.now();
function render(ts){
  const dt = Math.min(0.04, (ts-lastTs)/1000);
  lastTs = ts;
  if(state.playing) state.t += dt * (+ui.speed.value / 100);

  const w = cv.clientWidth, h = cv.clientHeight;
  const scale = +ui.scale.value;
  const cx = w*0.5 + (+ui.rodX.value);
  const cy = h*0.5;

  const { chargeSigned, currentSigned } = chargeAndCurrent(state.t);
  const { ys, r, a, surfaceGaps, moveUp } = electronCenters(chargeSigned);

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0,0,w,h);

  // rod
  const rodTopY = cy + (-0.80)*scale;
  const rodBotY = cy + ( 0.80)*scale;
  ctx.save();
  ctx.strokeStyle = 'rgba(12,16,22,0.92)';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, rodTopY);
  ctx.lineTo(cx, rodBotY);
  ctx.stroke();
  ctx.strokeStyle = COLORS.rod;
  ctx.lineWidth = 4.3;
  ctx.beginPath();
  ctx.moveTo(cx, rodTopY);
  ctx.lineTo(cx, rodBotY);
  ctx.stroke();
  ctx.restore();

  // charge symbols
  const qmag = Math.abs(chargeSigned);
  const topNegative = moveUp;
  const botNegative = !moveUp;
  const topSymbol = topNegative ? '−' : '+';
  const botSymbol = botNegative ? '−' : '+';
  const topColor = topNegative ? COLORS.neg : COLORS.pos;
  const botColor = botNegative ? COLORS.neg : COLORS.pos;

  function chargeGlyph(x,y,text,color,mag){
    const size = 12 + 11*mag;
    const strokeW = 0.3 + 2.0*mag;
    ctx.save();
    ctx.globalAlpha = 0.25 + 0.75*mag;
    ctx.font = `${600 + Math.round(250*mag)} ${size}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = strokeW;
    ctx.strokeStyle = 'rgba(12,16,22,0.88)';
    ctx.strokeText(text, x, y);
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  chargeGlyph(cx+18, rodTopY-10, topSymbol, topColor, qmag);
  chargeGlyph(cx+18, rodBotY+10, botSymbol, botColor, qmag);

  // electrons
  ys.forEach(y => {
    ctx.save();
    ctx.fillStyle = COLORS.electron;
    ctx.globalAlpha = 0.92;
    ctx.beginPath();
    ctx.arc(cx, cy + y*scale, r*scale, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // current arrow
  const imag = Math.abs(currentSigned);
  if(imag > 0.02){
    const len = scale * (0.16 + 0.34*imag);
    const dir = currentSigned >= 0 ? -1 : 1; // down when currentSigned < 0
    const x = cx - 28;
    const y1 = cy - dir*len*0.5;
    const y2 = cy + dir*len*0.5;
    const color = currentSigned >= 0 ? COLORS.curPos : COLORS.curNeg;
    drawArrow(x, y1, x, y2, color, 2.6 + 1.8*imag, 0.25 + 0.75*imag);

    ctx.save();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.3 + 0.7*imag;
    ctx.font = `${15 + 2*imag}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('I', x-12, cy);
    ctx.restore();
  }

  // readout of actual center and surface gaps
  const fmt = v => v.toFixed(4);
  readout.textContent =
`direction electrons: ${moveUp ? 'up' : 'down'}
current arrow:       ${currentSigned < 0 ? 'down' : 'up'}
a = ${fmt(a)}
d = ${fmt(2*r)}

center positions (relative pattern):
0
a+d
3a+2d
6a+3d
10a+4d
15a+5d
21a+6d

actual center gaps:
c1=${fmt(centerGaps[0])}
c2=${fmt(centerGaps[1])}
c3=${fmt(centerGaps[2])}
c4=${fmt(centerGaps[3])}
c5=${fmt(centerGaps[4])}
c6=${fmt(centerGaps[5])}

actual surface gaps:
g1=${fmt(surfaceGaps[0])}
g2=${fmt(surfaceGaps[1])}
g3=${fmt(surfaceGaps[2])}
g4=${fmt(surfaceGaps[3])}
g5=${fmt(surfaceGaps[4])}
g6=${fmt(surfaceGaps[5])}`;

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
